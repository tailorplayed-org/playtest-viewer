*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

}

a { color: #fcb700; }

/* Header */
.header {

  margin: 0 auto 32px;
}

.header h1 {

  font-size: 28px;
  font-weight: 700;
  margin-bottom: 16px;
}

.summary-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}

.summary-pill {
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.pill-critical { background: rgba(255,77,109,0.15); color: #ff4d6d; border: 1px solid rgba(255,77,109,0.3); }
.pill-warning  { background: rgba(252,183,0,0.15); color: #fcb700; border: 1px solid rgba(252,183,0,0.3); }
.pill-finding  { background: rgba(255,213,79,0.08); color: #ffd54f88; border: 1px solid rgba(255,213,79,0.15); }
.pill-pass     { background: rgba(0,186,123,0.15); color: #00BA7B; border: 1px solid rgba(0,186,123,0.3); }

.progress-bar {
  font-size: 15px;
  color: #ffd54f;
  opacity: 0.8;
}

.progress-bar strong { color: #fcb700; }

/* Severity groups (collapsible) */
.severity-group {
  max-width: 1100px;
  margin: 0 auto 24px;
}

.severity-group summary {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: #1a0033;
  border-radius: 12px;
  border: 1px solid rgba(252,183,0,0.15);
  font-size: 18px;
  font-weight: 600;
  list-style: none;
  user-select: none;
}

.severity-group summary::-webkit-details-marker { display: none; }

.severity-group summary::before {
  content: "\25BE";
  margin-left: 8px;
  transition: transform 0.2s;
  font-size: 14px;
}

.severity-group:not([open]) summary::before {
  transform: rotate(90deg);
}

.group-progress {
  font-size: 14px;
  color: #ffd54f88;
  font-weight: 400;
}

.severity-group .cards {
  margin-top: 12px;
}

/* Cards */
.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: #1a0033;
  border: 1px solid rgba(252,183,0,0.2);
  border-radius: 12px;
  padding: 20px 24px;
  transition: border-color 0.2s;
}

.card:hover { border-color: rgba(252,183,0,0.4); }

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.finding-id {
  font-weight: 700;
  font-size: 15px;
  color: #fcb700;
  min-width: 50px;
}

.severity-badge {
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-critical { background: #ff4d6d; color: #120022; }
.badge-warning  { background: #fcb700; color: #120022; }
.badge-finding  { background: rgba(255,213,79,0.25); color: #ffd54f; }
.badge-pass     { background: #00BA7B; color: #120022; }

.category-tag {
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(255,213,79,0.08);
  color: #ffd54f88;
  border: 1px solid rgba(255,213,79,0.1);
}

.status-indicator {
  margin-right: auto;
  margin-left: 0;
  font-size: 18px;
  min-width: 28px;
  text-align: center;
}

.card-description {
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 12px;
  color: #ffd54f;
  direction: ltr;
  text-align: left;
}

.card-evidence {
  font-size: 13px;
  color: #ffd54faa;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: rgba(255,213,79,0.04);
  border-radius: 8px;
  border-right: 3px solid rgba(252,183,0,0.3);
  border-left: none;
  direction: ltr;
  text-align: left;
}

.card-evidence strong { color: #ffd54f; }

.recommendation-box {
  margin-bottom: 14px;
  padding: 12px 16px;
  background: rgba(252,183,0,0.06);
  border: 1px solid rgba(252,183,0,0.15);
  border-radius: 8px;
}

.recommendation-box .rec-label {
  font-size: 12px;
  font-weight: 600;
  color: #fcb700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.recommendation-box .rec-text {
  font-size: 14px;
  line-height: 1.5;
  color: #ffd54f;
  direction: ltr;
  text-align: left;
}

/* Options */
.options-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.option-card {
  padding: 8px 14px;
  background: rgba(255,213,79,0.05);
  border: 1px solid rgba(252,183,0,0.2);
  border-radius: 8px;
  font-size: 13px;
  color: #ffd54f;
  cursor: pointer;
  transition: all 0.15s;
  flex: 1 1 auto;
  min-width: 180px;
  direction: ltr;
  text-align: left;
}

.option-card:hover { background: rgba(252,183,0,0.12); border-color: rgba(252,183,0,0.4); }
.option-card.selected { background: rgba(252,183,0,0.2); border-color: #fcb700; color: #fcb700; font-weight: 600; }

/* Decision controls */
.decision-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.btn {
  padding: 8px 18px;
  border: 1px solid;
  border-radius: 8px;
  font-family: 'Fredoka', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  background: transparent;
}

.btn:hover { transform: translateY(-1px); }

.btn-approve {
  border-color: #00BA7B;
  color: #00BA7B;
}
.btn-approve:hover, .btn-approve.active { background: #00BA7B; color: #120022; }

.btn-notclear {
  border-color: #fcb700;
  color: #fcb700;
}
.btn-notclear:hover, .btn-notclear.active { background: #fcb700; color: #120022; }

.btn-dismiss {
  border-color: #ff4d6d;
  color: #ff4d6d;
}
.btn-dismiss:hover, .btn-dismiss.active { background: #ff4d6d; color: #120022; }

.btn-monitor {
  border-color: #ffd54f88;
  color: #ffd54f88;
}
.btn-monitor:hover, .btn-monitor.active { background: rgba(255,213,79,0.25); color: #ffd54f; }

/* Notes */
.notes-area {
  margin-top: 12px;
}

.notes-area textarea {
  width: 100%;
  background: rgba(255,213,79,0.04);
  border: 1px solid rgba(252,183,0,0.15);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Fredoka', sans-serif;
  font-size: 13px;
  color: #ffd54f;
  resize: vertical;
  min-height: 32px;
  transition: min-height 0.2s;
  direction: rtl;
  text-align: right;
}

.notes-area textarea:focus {
  outline: none;
  border-color: rgba(252,183,0,0.4);
  min-height: 72px;
}

.notes-area textarea::placeholder { color: #ffd54f44; }

/* Pass cards (collapsed) */
.card.pass-card {
  padding: 12px 24px;
  cursor: default;
}

.card.pass-card .card-header { margin-bottom: 0; }

.card.pass-card .pass-title {
  font-size: 14px;
  color: #00BA7B;
  direction: ltr;
  text-align: left;
}

/* Confusion cards */
.confusion-meta {
  font-size: 13px;
  color: #ffd54faa;
  margin-bottom: 8px;
}

.confusion-text {
  direction: ltr;
  text-align: left;
}

/* Footer */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1a0033;
  border-top: 1px solid rgba(252,183,0,0.2);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  z-index: 100;
}

.footer-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.footer-warning {
  color: #ff4d6d;
  font-size: 13px;
  font-weight: 600;
}

.btn-export {
  padding: 10px 28px;
  background: #fcb700;
  color: #120022;
  border: none;
  border-radius: 8px;
  font-family: 'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-export:hover { background: #ffd54f; transform: translateY(-1px); }

/* Decided card styles — RTL: border-right */
.card.decided-approved { border-right: 3px solid #00BA7B; }
.card.decided-not_clear { border-right: 3px solid #fcb700; }
.card.decided-dismissed { border-right: 3px solid #ff4d6d; }
.card.decided-monitor { border-right: 3px solid #ffd54f88; }

@media (max-width: 768px) {
  body { padding: 16px 12px 120px; }
  .card { padding: 16px; }
  .option-card { min-width: 140px; }
}
</style>

  {
    id: "C-004",
    text: "Does Sheriff always override Priority in 2-player collisions?",
    raised_by: "Yossi (rules-lawyer)", games: "2", severity: "WARNING"
  },
  {
    id: "C-005",
    text: "Draining a 2-token location when alone (take all) \u2014 intended?",
    raised_by: "Ronit (chaotic)", games: "2", severity: "FINDING"
  },
  {
    id: "C-006",
    text: "Simultaneous completion tiebreaker for 3-case wins \u2014 how resolved?",
    raised_by: "Ronit (chaotic)", games: "2", severity: "WARNING"
  }
];

// ---- STATE ----

const state = {};

function initState() {
  FINDINGS.forEach(f => {
    state[f.id] = {
      decision: f.severity === "PASS" ? "pass" : "pending",
      selected_option: null,
      notes: ""
    };
  });
  CONFUSIONS.forEach(c => {
    state[c.id] = {
      decision: "pending",
      selected_option: null,
      notes: ""
    };
  });
}

// ---- RENDER ----

function severityClass(s) {
  return s.toLowerCase();
}

function statusEmoji(decision) {
  const map = {
    pending: "\u23F3",
    approved: "\u2705",
    not_clear: "\u2753",
    dismissed: "\u274C",
    monitor: "\uD83D\uDC41\uFE0F",
    pass: "\u2705"
  };
  return map[decision] || "\u23F3";
}

function groupProgress(severity) {
  const items = FINDINGS.filter(f => f.severity === severity && severity !== "PASS");
  if (items.length === 0) return "";
  const reviewed = items.filter(f => state[f.id].decision !== "pending").length;
  return reviewed + "/" + items.length + " \u05E0\u05D1\u05D3\u05E7\u05D5";
}

function confusionProgress() {
  const reviewed = CONFUSIONS.filter(c => state[c.id].decision !== "pending").length;
  return reviewed + "/" + CONFUSIONS.length + " \u05E0\u05D1\u05D3\u05E7\u05D5";
}

function renderFindings() {
  const container = document.getElementById("findings-container");
  const severityOrder = ["CRITICAL", "WARNING", "FINDING", "PASS"];
  let html = "";

  severityOrder.forEach(sev => {
    const items = FINDINGS.filter(f => f.severity === sev);
    if (items.length === 0) return;

    const isPass = sev === "PASS";
    const openAttr = isPass ? "" : " open";
    const label = SEVERITY_LABELS[sev];
    const progress = isPass ? "" : `<span class="group-progress">${groupProgress(sev)}</span>`;

    html += `<details${openAttr} class="severity-group severity-${severityClass(sev)}">
      <summary>
        <span class="group-badge summary-pill pill-${severityClass(sev)}">${label} (${items.length})</span>
        ${progress}
      </summary>
      <div class="cards">`;

    items.forEach(f => {
      if (isPass) {
        html += `
          <div class="card pass-card" id="card-${f.id}">
            <div class="card-header">
              <span class="finding-id">${f.id}</span>
              <span class="severity-badge badge-pass">${SEVERITY_LABELS.PASS}</span>
              <span class="category-tag">${f.category}</span>
              <span style="flex:1"></span>
              <span class="pass-title">${f.title}</span>
              <span class="status-indicator">\u2705</span>
            </div>
          </div>`;
        return;
      }

      const s = state[f.id];
      const approveLabel = f.recommendation
        ? "\u05D0\u05D9\u05E9\u05D5\u05E8: " + (f.recommendation.length > 50 ? f.recommendation.substring(0, 47) + "..." : f.recommendation)
        : "\u05D0\u05D9\u05E9\u05D5\u05E8";

      html += `
        <div class="card ${s.decision !== 'pending' ? 'decided-' + s.decision : ''}" id="card-${f.id}">
          <div class="card-header">
            <span class="finding-id">${f.id}</span>
            <span class="severity-badge badge-${severityClass(f.severity)}">${SEVERITY_LABELS[f.severity]}</span>
            <span class="category-tag">${f.category}</span>
            <span style="flex:1"></span>
            <span class="status-indicator" id="status-${f.id}">${statusEmoji(s.decision)}</span>
          </div>
          <div class="card-description">${f.description}</div>
          ${f.evidence ? `<div class="card-evidence"><strong>\u05E2\u05D3\u05D5\u05EA:</strong> ${f.evidence}</div>` : ""}
          ${f.recommendation ? `
            <div class="recommendation-box">
              <div class="rec-label">\u05D4\u05DE\u05DC\u05E6\u05EA \u05D4\u05D7\u05D9\u05D9\u05D6\u05E8\u05D9\u05DD</div>
              <div class="rec-text">${f.recommendation}</div>
            </div>` : ""}
          ${f.options ? `
            <div class="options-grid" id="options-${f.id}">
              ${f.options.map((o, i) => `<div class="option-card ${s.selected_option === o ? 'selected' : ''}" onclick="selectOption('${f.id}', ${i})">${String.fromCharCode(65 + i)}) ${o}</div>`).join("")}
            </div>` : ""}
          <div class="decision-controls">
            <button class="btn btn-approve ${s.decision === 'approved' ? 'active' : ''}" onclick="decide('${f.id}', 'approved')">${approveLabel}</button>
            <button class="btn btn-notclear ${s.decision === 'not_clear' ? 'active' : ''}" onclick="decide('${f.id}', 'not_clear')">\u05DC\u05D0 \u05D1\u05E8\u05D5\u05E8</button>
            <button class="btn btn-dismiss ${s.decision === 'dismissed' ? 'active' : ''}" onclick="decide('${f.id}', 'dismissed')">\u05D3\u05D7\u05D9\u05D9\u05D4</button>
            <button class="btn btn-monitor ${s.decision === 'monitor' ? 'active' : ''}" onclick="decide('${f.id}', 'monitor')">\u05DE\u05E2\u05E7\u05D1</button>
          </div>
          <div class="notes-area">
            <textarea id="notes-${f.id}" placeholder="\u05D4\u05E2\u05E8\u05D5\u05EA..." oninput="updateNotes('${f.id}')">${s.notes}</textarea>
          </div>
        </div>`;
    });

    html += `</div></details>`;
  });

  container.innerHTML = html;
}

function renderConfusions() {
  const container = document.getElementById("confusions-container");
  let html = `<details open class="severity-group severity-confusion">
    <summary>
      <span class="group-badge summary-pill" style="background: rgba(42,126,255,0.15); color: #2A7EFF; border: 1px solid rgba(42,126,255,0.3); padding: 4px 14px; border-radius: 20px; font-size: 14px;">\u05D1\u05DC\u05D1\u05D5\u05DC\u05D9 \u05E9\u05D7\u05E7\u05E0\u05D9\u05DD (${CONFUSIONS.length})</span>
      <span class="group-progress">${confusionProgress()}</span>
    </summary>
    <div class="cards">`;

  CONFUSIONS.forEach(c => {
    const s = state[c.id];
    html += `
      <div class="card ${s.decision !== 'pending' ? 'decided-' + s.decision : ''}" id="card-${c.id}">
        <div class="card-header">
          <span class="finding-id">${c.id}</span>
          <span class="severity-badge badge-${severityClass(c.severity)}">${SEVERITY_LABELS[c.severity]}</span>
          <span style="flex:1"></span>
          <span class="status-indicator" id="status-${c.id}">${statusEmoji(s.decision)}</span>
        </div>
        <div class="card-description confusion-text">${c.text}</div>
        <div class="confusion-meta">\u05D4\u05D5\u05E2\u05DC\u05D4 \u05E2"\u05D9: <strong>${c.raised_by}</strong> | \u05DE\u05E9\u05D7\u05E7\u05D9\u05DD: ${c.games}</div>
        <div class="decision-controls">
          <button class="btn btn-approve ${s.decision === 'approved' ? 'active' : ''}" onclick="decide('${c.id}', 'approved')">\u05D0\u05D9\u05E9\u05D5\u05E8 \u05EA\u05D9\u05E7\u05D5\u05DF</button>
          <button class="btn btn-notclear ${s.decision === 'not_clear' ? 'active' : ''}" onclick="decide('${c.id}', 'not_clear')">\u05DC\u05D0 \u05D1\u05E8\u05D5\u05E8</button>
          <button class="btn btn-dismiss ${s.decision === 'dismissed' ? 'active' : ''}" onclick="decide('${c.id}', 'dismissed')">\u05D3\u05D7\u05D9\u05D9\u05D4</button>
          <button class="btn btn-monitor ${s.decision === 'monitor' ? 'active' : ''}" onclick="decide('${c.id}', 'monitor')">\u05DE\u05E2\u05E7\u05D1</button>
        </div>
        <div class="notes-area">
          <textarea id="notes-${c.id}" placeholder="\u05D4\u05E2\u05E8\u05D5\u05EA..." oninput="updateNotes('${c.id}')">${s.notes}</textarea>
        </div>
      </div>`;
  });

  html += `</div></details>`;
  container.innerHTML = html;
}

// ---- ACTIONS ----

function decide(id, decision) {
  const current = state[id].decision;
  state[id].decision = current === decision ? "pending" : decision;
  render();
}

function selectOption(id, index) {
  const finding = FINDINGS.find(f => f.id === id);
  if (!finding || !finding.options) return;
  const opt = finding.options[index];
  state[id].selected_option = state[id].selected_option === opt ? null : opt;
  render();
}

function updateNotes(id) {
  const el = document.getElementById("notes-" + id);
  if (el) state[id].notes = el.value;
}

function updateCounts() {
  const severities = { CRITICAL: 0, WARNING: 0, FINDING: 0, PASS: 0 };
  FINDINGS.forEach(f => severities[f.severity]++);

  document.getElementById("count-critical").textContent = severities.CRITICAL;
  document.getElementById("count-warning").textContent = severities.WARNING;
  document.getElementById("count-finding").textContent = severities.FINDING;
  document.getElementById("count-pass").textContent = severities.PASS;
  document.getElementById("count-total").textContent = FINDINGS.length;

  const reviewable = FINDINGS.filter(f => f.severity !== "PASS").length + CONFUSIONS.length;
  let reviewed = 0;
  FINDINGS.forEach(f => { if (f.severity !== "PASS" && state[f.id].decision !== "pending") reviewed++; });
  CONFUSIONS.forEach(c => { if (state[c.id].decision !== "pending") reviewed++; });

  document.getElementById("reviewed-count").textContent = reviewed;
  document.getElementById("total-reviewable").textContent = reviewable;
  document.getElementById("footer-reviewed").textContent = reviewed;
  document.getElementById("footer-total").textContent = reviewable;

  const critPending = FINDINGS.filter(f => f.severity === "CRITICAL" && state[f.id].decision === "pending").length;
  document.getElementById("critical-warning").style.display = critPending > 0 ? "block" : "none";
}

function render() {
  const noteValues = {};
  Object.keys(state).forEach(id => {
    const el = document.getElementById("notes-" + id);
    if (el) noteValues[id] = el.value;
  });

  renderFindings();
  renderConfusions();
  updateCounts();

  Object.keys(noteValues).forEach(id => {
    const el = document.getElementById("notes-" + id);
    if (el) {
      el.value = noteValues[id];
      state[id].notes = noteValues[id];
    }
  });
}

// ---- EXPORT ----

function exportJSON() {
  const now = new Date().toISOString();

  const findingsOut = FINDINGS.map(f => ({
    id: f.id,
    title: f.title,
    severity: f.severity,
    category: f.category,
    decision: state[f.id].decision,
    selected_option: state[f.id].selected_option,
    notes: state[f.id].notes
  }));

  const confusionsOut = CONFUSIONS.map(c => ({
    id: c.id,
    text: c.text,
    raised_by: c.raised_by,
    decision: state[c.id].decision,
    notes: state[c.id].notes
  }));

  const breakdown = { approved: 0, not_clear: 0, dismissed: 0, monitor: 0, pending: 0, pass: 0 };
  findingsOut.forEach(f => breakdown[f.decision]++);
  confusionsOut.forEach(c => { if (breakdown[c.decision] !== undefined) breakdown[c.decision]++; });

  const reviewed = Object.values(state).filter(s => s.decision !== "pending" && s.decision !== "pass").length;
  const pending = Object.values(state).filter(s => s.decision === "pending").length;

  const output = {
    order_id: "TP-2026-00040",
    game_title: "Gold Hunt",
    exported_at: now,
    total_findings: FINDINGS.length,
    total_confusions: CONFUSIONS.length,
    decisions: {
      reviewed: reviewed,
      pending: pending,
      breakdown: breakdown
    },
    findings: findingsOut,
    player_confusions: confusionsOut
  };

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "findings-decisions.json";
  a.click();
  URL.revokeObjectURL(url);
}

// ---- INIT ----

initState();
render();
</script>
</body>
</html>
