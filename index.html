<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>TailorPlayed — Playtest Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/TextPlugin.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ============================================
   DESIGN SYSTEM — CSS Custom Properties
   ============================================ */
:root {
  /* Theme (overridden by applyTheme) */
  --hue: 38;
  --sat: 80%;
  --primary: hsl(var(--hue), var(--sat), 55%);
  --primary-dim: hsl(var(--hue), calc(var(--sat) - 20%), 35%);
  --primary-glow: hsla(var(--hue), var(--sat), 55%, 0.15);
  --primary-soft: hsla(var(--hue), var(--sat), 55%, 0.08);
  --accent-hue: 15;
  --accent: hsl(var(--accent-hue), 85%, 50%);
  --accent-glow: hsla(var(--accent-hue), 85%, 50%, 0.12);

  --bg: hsl(var(--hue), 15%, 7%);
  --surface: hsl(var(--hue), 12%, 11%);
  --surface-2: hsl(var(--hue), 10%, 15%);
  --surface-3: hsl(var(--hue), 8%, 19%);
  --border: hsl(var(--hue), 10%, 22%);
  --border-light: hsl(var(--hue), 8%, 28%);
  --text: hsl(var(--hue), 15%, 90%);
  --text-dim: hsl(var(--hue), 10%, 55%);
  --text-muted: hsl(var(--hue), 8%, 40%);

  --green: hsl(150, 60%, 45%);
  --red: hsl(0, 70%, 58%);
  --yellow: hsl(45, 90%, 55%);
  --blue: hsl(210, 70%, 58%);
  --purple: hsl(270, 55%, 60%);

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --radius-xl: 28px;

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px var(--primary-glow);

  --font-display: 'Fredoka', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--primary-glow) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ============================================
   LAYOUT
   ============================================ */
.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 1rem; }

/* ============================================
   HEADER
   ============================================ */
.header {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow-sm);
}
.header-icon {
  width: 44px; height: 44px;
  background: var(--primary-glow);
  border: 2px solid var(--primary-dim);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
  flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-title {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-subtitle { font-size: 0.8rem; color: var(--text-dim); }
.header-badge {
  padding: 0.3rem 0.9rem;
  border-radius: 100px;
  font-family: var(--font-display);
  font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap;
}
.badge-pass { background: hsla(150,60%,45%,0.12); color: var(--green); border: 1px solid hsla(150,60%,45%,0.25); }
.badge-guardrail { background: hsla(45,90%,55%,0.1); color: var(--yellow); border: 1px solid hsla(45,90%,55%,0.2); }
.badge-fail { background: hsla(0,70%,55%,0.1); color: var(--red); border: 1px solid hsla(0,70%,55%,0.2); }
.badge-live { background: hsla(210,70%,58%,0.1); color: var(--blue); border: 1px solid hsla(210,70%,58%,0.2); animation: livePulse 2s ease infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 70vh; text-align: center; padding: 2rem;
}
.empty-alien {
  width: 120px; height: 120px;
  background: var(--surface-2);
  border: 2px solid var(--border);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  position: relative;
  margin-bottom: 2rem;
  animation: alienFloat 3s ease-in-out infinite;
}
.empty-alien::before, .empty-alien::after {
  content: '';
  position: absolute;
  width: 22px; height: 28px;
  background: var(--primary);
  border-radius: 50%;
  top: 35%;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.3), 0 0 12px var(--primary-glow);
}
.empty-alien::before { left: 28%; }
.empty-alien::after { right: 28%; }
@keyframes alienFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.empty-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.empty-text { color: var(--text-dim); font-size: 0.95rem; max-width: 400px; }

/* ============================================
   SUMMARY GRID
   ============================================ */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0; transition: opacity 0.3s;
}
.game-card:hover { border-color: var(--primary-dim); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.game-card:hover::before { opacity: 1; }
.game-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.game-card-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; }
.game-card-players {
  display: flex; gap: -4px;
}
.game-card-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; color: #fff;
  border: 2px solid var(--surface);
  margin-left: -6px;
}
.game-card-avatar:first-child { margin-left: 0; }
.game-card-stats {
  display: flex; gap: 1.25rem;
  font-size: 0.8rem; color: var(--text-dim);
}
.game-card-stat { display: flex; align-items: center; gap: 0.35rem; }
.game-card-stat svg { width: 14px; height: 14px; opacity: 0.6; }
.game-card-findings { color: var(--yellow); }

/* ============================================
   GAME VIEW LAYOUT
   ============================================ */
.game-view { display: none; }
.game-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  grid-template-rows: auto auto 1fr;
  gap: 1rem;
}
@media (max-width: 900px) {
  .game-layout { grid-template-columns: 1fr; }
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim); padding: 0.5rem 1rem;
  cursor: pointer; font-size: 0.85rem; font-family: var(--font-body);
  transition: all 0.2s;
  margin-bottom: 1rem;
}
.back-btn:hover { color: var(--text); border-color: var(--primary-dim); }
.back-btn svg { width: 16px; height: 16px; }

/* ============================================
   TIMELINE
   ============================================ */
.timeline {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 0.35rem;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.timeline::-webkit-scrollbar { height: 4px; }
.timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.round-dot {
  min-width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 0.75rem; font-weight: 600;
  cursor: pointer;
  background: var(--surface-2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  transition: all 0.25s var(--ease);
  flex-shrink: 0;
}
.round-dot:hover { border-color: var(--primary-dim); color: var(--text); }
.round-dot.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 0 16px var(--primary-glow);
}
.round-dot.flagged { border-color: var(--red); }
.round-dot.collision { border-color: var(--yellow); }
.timeline-spacer { flex: 1; }
.timeline-controls { display: flex; gap: 0.3rem; flex-shrink: 0; }
.tl-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s;
}
.tl-btn:hover { color: var(--text); border-color: var(--primary-dim); }
.tl-btn svg { width: 16px; height: 16px; }
.tl-btn.playing { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ============================================
   BOARD PANEL
   ============================================ */
.board-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  position: relative;
  overflow: hidden;
}
.board-panel::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, var(--primary-soft), transparent 70%);
  pointer-events: none;
}
.panel-label {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-display);
  font-size: 0.8rem; font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}
.panel-label svg { width: 16px; height: 16px; opacity: 0.5; }
.board-svg { width: 100%; height: auto; position: relative; z-index: 1; }

/* SVG Board Styles */
.board-svg .connection-path {
  fill: none;
  stroke: var(--border-light);
  stroke-width: 2;
  stroke-dasharray: 6, 4;
  opacity: 0.5;
}
.board-svg .loc-group { cursor: default; }
.board-svg .loc-bg {
  fill: var(--surface-2);
  stroke: var(--border);
  stroke-width: 2;
  rx: 10;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  transition: stroke 0.3s;
}
.board-svg .loc-bg.active-loc { stroke: var(--primary); stroke-width: 2.5; }
.board-svg .loc-icon { font-size: 18px; text-anchor: middle; dominant-baseline: central; }
.board-svg .loc-name {
  fill: var(--text);
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  text-anchor: middle;
}
.board-svg .loc-tokens-label {
  fill: var(--text-dim);
  font-family: var(--font-body);
  font-size: 9px;
  text-anchor: middle;
}
.board-svg .player-pip {
  stroke: var(--surface);
  stroke-width: 2;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
}

/* ============================================
   COMMENTARY FEED
   ============================================ */
.commentary-panel {
  grid-row: 2 / 4;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column;
  max-height: 600px;
  overflow: hidden;
}
@media (max-width: 900px) {
  .commentary-panel { grid-row: auto; max-height: 500px; }
}
.commentary-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.5rem;
}
.commentary-header .panel-label { margin-bottom: 0; }
.commentary-feed {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex; flex-direction: column; gap: 0.6rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.commentary-feed::-webkit-scrollbar { width: 4px; }
.commentary-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Message Bubbles */
.msg {
  display: flex; gap: 0.6rem;
  animation: msgIn 0.4s var(--ease-bounce) both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-weight: 700; font-size: 0.7rem;
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.msg-avatar svg { width: 16px; height: 16px; }
.msg-body { flex: 1; min-width: 0; }
.msg-name {
  font-family: var(--font-display);
  font-size: 0.75rem; font-weight: 600;
  margin-bottom: 0.15rem;
}
.msg-bubble {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 2px var(--radius) var(--radius) var(--radius);
  padding: 0.6rem 0.85rem;
  font-size: 0.84rem;
  line-height: 1.5;
  position: relative;
}
.msg-bubble.referee {
  background: var(--primary-soft);
  border-color: var(--primary-dim);
}
.msg-bubble.flag {
  background: hsla(0,70%,55%,0.08);
  border-color: hsla(0,70%,55%,0.25);
}
.msg-bubble.observer {
  background: hsla(270,55%,60%,0.06);
  border-color: hsla(270,55%,60%,0.2);
}
.msg-badge {
  display: inline-block;
  padding: 0.1rem 0.5rem;
  border-radius: 100px;
  font-size: 0.65rem; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.3rem;
}

/* Action results inside bubbles */
.action-result {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.25rem 0;
  font-size: 0.82rem;
}
.action-result svg { width: 14px; height: 14px; flex-shrink: 0; }
.collision-flash {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.4rem 0.7rem;
  background: hsla(0,70%,55%,0.1);
  border-radius: var(--radius-sm);
  margin: 0.3rem 0;
  font-size: 0.82rem;
}
.collision-flash svg { width: 16px; height: 16px; color: var(--red); }

/* ============================================
   SCOREBOARD
   ============================================ */
.scoreboard-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}
.player-card {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.7rem 0;
  border-bottom: 1px solid var(--border);
}
.player-card:last-child { border-bottom: none; }
.player-card.leader .player-avatar { box-shadow: 0 0 0 2px var(--primary), 0 0 12px var(--primary-glow); }
.player-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.8rem;
  color: #fff;
  flex-shrink: 0;
  position: relative;
}
.player-avatar svg { width: 18px; height: 18px; }
.player-info { flex: 1; min-width: 0; }
.player-card-name {
  font-family: var(--font-display);
  font-size: 0.9rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-role {
  font-size: 0.7rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.player-score-block { text-align: right; }
.player-score-num {
  font-family: var(--font-display);
  font-size: 1.2rem; font-weight: 700;
}
.player-score-label {
  font-size: 0.65rem; color: var(--text-muted);
}

/* Supply */
.supply-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.supply-bar-track {
  height: 8px; background: var(--surface-2);
  border-radius: 4px; overflow: hidden; margin: 0.5rem 0;
}
.supply-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 4px;
  transition: width 0.6s var(--ease);
}
.supply-label {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; color: var(--text-dim);
}

/* ============================================
   UTILITIES
   ============================================ */
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 600px) {
  .app { padding: 0.5rem; }
  .header { padding: 0.75rem 1rem; }
  .header-title { font-size: 1.1rem; }
  .summary-grid { grid-template-columns: 1fr; }
  .commentary-panel { max-height: 400px; }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <div class="header" id="header">
    <div class="header-icon" id="header-icon">
      <i data-lucide="radar" style="width:22px;height:22px"></i>
    </div>
    <div class="header-info">
      <div class="header-title" id="header-title">TailorPlayed Playtest</div>
      <div class="header-subtitle" id="header-subtitle">The Aliens are watching...</div>
    </div>
    <div id="header-badge"></div>
  </div>

  <!-- EMPTY STATE -->
  <div id="empty-state" class="empty-state hidden">
    <div class="empty-alien"></div>
    <div class="empty-title">No playtest data yet</div>
    <div class="empty-text">Run <code style="background:var(--surface-2);padding:0.15rem 0.5rem;border-radius:4px;font-size:0.85rem">/aliens-playtest</code> to start a simulation. The Aliens will appear here once they begin playing.</div>
  </div>

  <!-- SUMMARY VIEW -->
  <div id="summary-view" class="hidden">
    <div class="summary-grid" id="games-grid"></div>
  </div>

  <!-- GAME VIEW -->
  <div id="game-view" class="game-view">
    <button class="back-btn" onclick="showSummary()">
      <i data-lucide="arrow-left"></i> All Games
    </button>

    <div class="game-layout">
      <!-- Timeline -->
      <div class="timeline" id="timeline"></div>

      <!-- Board -->
      <div class="board-panel">
        <div class="panel-label"><i data-lucide="map"></i> Board</div>
        <svg class="board-svg" id="board-svg" viewBox="0 0 560 420"></svg>
      </div>

      <!-- Commentary -->
      <div class="commentary-panel">
        <div class="commentary-header">
          <div class="panel-label"><i data-lucide="message-circle"></i> Live Feed</div>
        </div>
        <div class="commentary-feed" id="commentary-feed"></div>
      </div>

      <!-- Scoreboard -->
      <div class="scoreboard-panel">
        <div class="panel-label"><i data-lucide="trophy"></i> Players</div>
        <div id="scoreboard"></div>
        <div class="supply-section">
          <div class="panel-label"><i data-lucide="box"></i> Supply</div>
          <div id="supply-info"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// THEME ENGINE
// ============================================================
const THEMES = {
  emperorsClothes:  { hue:38,  accHue:15,  sat:'80%', font:'Fredoka',        fontBody:'DM Sans' },
  fairyTaleStitch:  { hue:280, accHue:330, sat:'55%', font:'Quicksand',      fontBody:'Nunito' },
  soldiersAndHeroes:{ hue:140, accHue:35,  sat:'45%', font:'Oswald',         fontBody:'Roboto Condensed' },
  bedtimeStory:     { hue:220, accHue:45,  sat:'55%', font:'Fredoka',        fontBody:'Nunito' },
  powerCard:        { hue:0,   accHue:210, sat:'75%', font:'Russo One',      fontBody:'Exo 2' },
  toyBox:           { hue:30,  accHue:200, sat:'70%', font:'Fredoka',        fontBody:'DM Sans' },
  threadAndPaint:   { hue:350, accHue:45,  sat:'50%', font:'Playfair Display',fontBody:'Source Sans 3' },
  actionFigures:    { hue:210, accHue:0,   sat:'65%', font:'Oswald',         fontBody:'Roboto Condensed' },
  talkingToys:      { hue:160, accHue:280, sat:'50%', font:'Quicksand',      fontBody:'DM Sans' },
  childsPlay:       { hue:45,  accHue:190, sat:'80%', font:'Fredoka',        fontBody:'Nunito' },
  sewingMachine:    { hue:20,  accHue:340, sat:'40%', font:'Playfair Display',fontBody:'Source Sans 3' },
  theDie:           { hue:250, accHue:120, sat:'60%', font:'Russo One',      fontBody:'Exo 2' },
  toysOfYesterday:  { hue:35,  accHue:10,  sat:'45%', font:'Playfair Display',fontBody:'DM Sans' },
  default:          { hue:250, accHue:35,  sat:'55%', font:'Fredoka',        fontBody:'DM Sans' }
};

function applyTheme(artStyle) {
  const t = THEMES[artStyle] || THEMES.default;
  const r = document.documentElement.style;
  r.setProperty('--hue', t.hue);
  r.setProperty('--accent-hue', t.accHue);
  r.setProperty('--sat', t.sat);
  r.setProperty('--font-display', `'${t.font}', sans-serif`);
  r.setProperty('--font-body', `'${t.fontBody}', sans-serif`);
  // Inject Google Fonts
  const fonts = [t.font, t.fontBody].filter((f,i,a) => a.indexOf(f) === i).map(f => f.replace(/ /g, '+')).join('&family=');
  const existing = document.getElementById('theme-fonts');
  if (existing) existing.remove();
  const link = document.createElement('link');
  link.id = 'theme-fonts';
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${fonts}:wght@400;500;600;700&display=swap`;
  document.head.appendChild(link);
}

// ============================================================
// ICONS for player personalities
// ============================================================
const PERSONALITY_ICONS = {
  strategist:   'crosshair',
  casual:       'smile',
  'rules-lawyer': 'scale',
  chaotic:      'shuffle',
  observer:     'eye',
  referee:      'shield'
};
const PLAYER_COLORS = ['#E24B4A','#4ABDE2','#4AE28B','#E2A84A','#C464E2','#E2648A','#64E2C4','#8B64E2'];
const LOCATION_ICONS = ['🏛','⚓','🏪','🗄','🏔','⛺','🔍','🎪','🏚','⛰','🌵','🗺'];

// ============================================================
// STATE
// ============================================================
let games = [];
let currentGame = null;
let currentRound = 0;
let autoPlayTimer = null;
const params = new URLSearchParams(location.search);
const ORDER = params.get('order') || '';
const BASE = (() => {
  const p = location.pathname.replace(/\/index\.html$/,'').replace(/\/$/,'');
  return location.origin + p;
})();

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  if (!ORDER) { showEmpty(); return; }

  // Try report.json manifest first
  try {
    const r = await fetch(`${BASE}/${ORDER}/report.json?_=${Date.now()}`);
    if (r.ok) {
      const data = await r.json();
      if (data.games?.length) { games = data.games; boot(); return; }
    }
  } catch(e) {}

  // Fallback: try a small set of likely filenames
  const found = [];
  const counts = [2,3,4,5,6,8];
  for (let n = 1; n <= 8; n++) {
    for (const pc of counts) {
      try {
        const fn = `game-${String(n).padStart(2,'0')}-${pc}p.json`;
        const r = await fetch(`${BASE}/${ORDER}/games/${fn}?_=${Date.now()}`);
        if (r.ok) { found.push(await r.json()); }
      } catch(e) {}
    }
    if (n >= 3 && found.length === 0) break; // stop early if nothing found
  }

  if (found.length > 0) { games = found; boot(); }
  else { showEmpty(); }
}

function boot() {
  const first = games[0];
  if (first?.meta) {
    applyTheme(first.meta.art_style || 'default');
    document.getElementById('header-title').textContent = first.meta.game_title || 'Playtest';
    document.getElementById('header-subtitle').textContent = `${first.meta.order_id || ORDER} · ${games.length} game${games.length > 1 ? 's' : ''} · The Aliens are watching...`;
  }

  const gameNum = params.get('game') ? parseInt(params.get('game')) : null;
  if (gameNum) {
    const g = games.find(g => g.meta.game_number === gameNum);
    if (g) { openGame(g); return; }
  }

  if (games.length === 1) { openGame(games[0]); }
  else { showSummary(); }
}

function showEmpty() {
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('summary-view').classList.add('hidden');
  document.getElementById('game-view').style.display = 'none';
}

// ============================================================
// SUMMARY VIEW
// ============================================================
function showSummary() {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('summary-view').classList.remove('hidden');
  document.getElementById('game-view').style.display = 'none';
  if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }

  // Verdict
  const gaps = games.reduce((s, g) => s + (g.final_analysis?.rule_gaps_found || 0), 0);
  setBadge(gaps > 3 ? 'FAIL' : gaps > 0 ? 'GUARDRAIL' : 'PASS');

  const grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  games.forEach((game, i) => {
    const fa = game.final_analysis || {};
    const findings = (fa.rule_gaps_found||0) + (fa.rule_ambiguities_found||0);
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => openGame(game);
    card.innerHTML = `
      <div class="game-card-header">
        <div class="game-card-title">Game ${game.meta.game_number||i+1} — ${game.meta.player_count}p</div>
        <div class="game-card-players">
          ${(game.meta.players||[]).map((p,j) => `<div class="game-card-avatar" style="background:${p.color||PLAYER_COLORS[j]}">${(p.name||'?')[0]}</div>`).join('')}
        </div>
      </div>
      <div class="game-card-stats">
        <span class="game-card-stat"><i data-lucide="repeat"></i> ${fa.game_length_rounds || game.rounds?.length || '?'} rounds</span>
        <span class="game-card-stat"><i data-lucide="crown"></i> ${fa.winner || '—'}</span>
        ${findings ? `<span class="game-card-stat game-card-findings"><i data-lucide="alert-triangle"></i> ${findings}</span>` : ''}
      </div>`;
    grid.appendChild(card);
  });
  lucide.createIcons();
}

function setBadge(verdict) {
  const el = document.getElementById('header-badge');
  const c = verdict === 'PASS' ? 'badge-pass' : verdict === 'FAIL' ? 'badge-fail' : verdict === 'LIVE' ? 'badge-live' : 'badge-guardrail';
  el.innerHTML = `<span class="header-badge ${c}">${verdict}</span>`;
}

// ============================================================
// GAME VIEW
// ============================================================
function openGame(game) {
  currentGame = game;
  currentRound = Math.max(0, (game.rounds?.length || 1) - 1);

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('summary-view').classList.add('hidden');
  document.getElementById('game-view').style.display = 'block';

  buildTimeline();
  renderBoard();
  showRound(currentRound);
  lucide.createIcons();

  if (game.meta.status === 'in_progress') startPolling();
}

// ============================================================
// TIMELINE
// ============================================================
function buildTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = '';
  if (!currentGame?.rounds) return;

  currentGame.rounds.forEach((r, i) => {
    const dot = document.createElement('div');
    dot.className = 'round-dot';
    if (i === currentRound) dot.classList.add('active');
    if (r.referee_flags?.length) dot.classList.add('flagged');
    else if (r.resolution?.collisions?.length) dot.classList.add('collision');
    dot.textContent = r.round_number || i + 1;
    dot.onclick = () => goRound(i);
    el.appendChild(dot);
  });

  el.innerHTML += `<div class="timeline-spacer"></div>`;

  const controls = document.createElement('div');
  controls.className = 'timeline-controls';
  controls.innerHTML = `
    <button class="tl-btn" onclick="goRound(currentRound-1)" title="Previous"><i data-lucide="chevron-left"></i></button>
    <button class="tl-btn" id="autoplay-btn" onclick="toggleAutoPlay()" title="Auto-play"><i data-lucide="play"></i></button>
    <button class="tl-btn" onclick="goRound(currentRound+1)" title="Next"><i data-lucide="chevron-right"></i></button>`;
  el.appendChild(controls);
  lucide.createIcons();
}

function goRound(idx) {
  if (!currentGame?.rounds || idx < 0 || idx >= currentGame.rounds.length) return;
  currentRound = idx;
  buildTimeline();
  showRound(idx);
}

function toggleAutoPlay() {
  if (autoPlayTimer) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    document.getElementById('autoplay-btn')?.classList.remove('playing');
  } else {
    document.getElementById('autoplay-btn')?.classList.add('playing');
    autoPlayTimer = setInterval(() => {
      if (currentRound < currentGame.rounds.length - 1) goRound(currentRound + 1);
      else { clearInterval(autoPlayTimer); autoPlayTimer = null; document.getElementById('autoplay-btn')?.classList.remove('playing'); }
    }, 3000);
  }
}

// ============================================================
// BOARD RENDERING
// ============================================================
function renderBoard() {
  const svg = document.getElementById('board-svg');
  svg.innerHTML = '';
  if (!currentGame?.board?.locations?.length) return;

  const locs = currentGame.board.locations;
  const conns = currentGame.board.connections || [];
  const n = locs.length;
  const W = 560, H = 420, cx = W/2, cy = H/2, R = Math.min(W, H) * 0.35;

  // Position locations
  locs.forEach((loc, i) => {
    if (loc.x != null && loc.y != null) {
      loc._x = loc.x * (W/600);
      loc._y = loc.y * (H/500) + 20;
    } else {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      loc._x = cx + Math.cos(a) * R;
      loc._y = cy + Math.sin(a) * R;
    }
  });

  // Defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg.appendChild(defs);

  // Connections as curves
  conns.forEach(c => {
    const from = locs.find(l => l.id === c.from);
    const to = locs.find(l => l.id === c.to);
    if (!from || !to) return;
    const mx = (from._x + to._x) / 2;
    const my = (from._y + to._y) / 2;
    const dx = to._x - from._x;
    const dy = to._y - from._y;
    const offset = Math.min(30, Math.sqrt(dx*dx + dy*dy) * 0.15);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','connection-path');
    path.setAttribute('d', `M${from._x},${from._y} Q${mx - dy*0.1},${my + dx*0.1} ${to._x},${to._y}`);
    svg.appendChild(path);
  });

  // Location nodes
  locs.forEach((loc, i) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','loc-group');
    g.setAttribute('transform', `translate(${loc._x},${loc._y})`);
    g.setAttribute('data-loc-id', loc.id);

    // Background rect with rounded corners
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('class','loc-bg');
    bg.setAttribute('x', -38); bg.setAttribute('y', -28);
    bg.setAttribute('width', 76); bg.setAttribute('height', 56);
    g.appendChild(bg);

    // Icon
    const icon = document.createElementNS('http://www.w3.org/2000/svg','text');
    icon.setAttribute('class','loc-icon');
    icon.setAttribute('y', -6);
    icon.textContent = LOCATION_ICONS[i % LOCATION_ICONS.length];
    g.appendChild(icon);

    // Name
    const name = document.createElementNS('http://www.w3.org/2000/svg','text');
    name.setAttribute('class','loc-name');
    name.setAttribute('y', 14);
    name.textContent = (loc.name || loc.id).length > 10 ? (loc.name || loc.id).slice(0,9) + '…' : (loc.name || loc.id);
    g.appendChild(name);

    // Token count
    if (loc.tokens != null) {
      const tk = document.createElementNS('http://www.w3.org/2000/svg','text');
      tk.setAttribute('class','loc-tokens-label');
      tk.setAttribute('y', 24);
      tk.textContent = `${loc.tokens} tokens`;
      g.appendChild(tk);
    }

    svg.appendChild(g);
  });
}

function updateBoardForRound(roundIdx) {
  if (!currentGame?.rounds?.[roundIdx]) return;
  const r = currentGame.rounds[roundIdx];
  const svg = document.getElementById('board-svg');

  // Remove old player pips
  svg.querySelectorAll('.player-pip').forEach(el => el.remove());

  // Determine player locations from actions
  if (!r.actions) return;
  const locPlayers = {};
  r.actions.forEach(a => {
    if (a.target) {
      if (!locPlayers[a.target]) locPlayers[a.target] = [];
      locPlayers[a.target].push(a.player_id);
    }
  });

  // Draw player pips at locations
  Object.entries(locPlayers).forEach(([locId, playerIds]) => {
    const locG = svg.querySelector(`[data-loc-id="${locId}"]`);
    if (!locG) return;
    playerIds.forEach((pid, j) => {
      const p = currentGame.meta.players.find(p => p.id === pid);
      const color = p?.color || PLAYER_COLORS[j];
      const pip = document.createElementNS('http://www.w3.org/2000/svg','circle');
      pip.setAttribute('class','player-pip');
      pip.setAttribute('cx', -20 + j * 14);
      pip.setAttribute('cy', -22);
      pip.setAttribute('r', 6);
      pip.setAttribute('fill', color);
      locG.appendChild(pip);
    });
  });

  // Highlight active locations
  svg.querySelectorAll('.loc-bg').forEach(el => el.classList.remove('active-loc'));
  Object.keys(locPlayers).forEach(locId => {
    const bg = svg.querySelector(`[data-loc-id="${locId}"] .loc-bg`);
    if (bg) bg.classList.add('active-loc');
  });
}

// ============================================================
// SHOW ROUND (Commentary + Scoreboard + Board)
// ============================================================
function showRound(idx) {
  if (!currentGame?.rounds?.[idx]) return;
  const r = currentGame.rounds[idx];
  const feed = document.getElementById('commentary-feed');
  feed.innerHTML = '';

  // Round header
  addMsg(feed, 'referee', 'Referee', `Round ${r.round_number || idx + 1}`, 'referee');

  // Thoughts
  (r.thoughts || []).forEach(t => {
    const p = currentGame.meta.players.find(p => p.id === t.player_id) || {};
    addMsg(feed, p.personality || 'casual', p.name || t.player_id, t.text, '', p.color);
  });

  // Actions
  if (r.actions?.length) {
    const lines = r.actions.map(a => {
      const p = currentGame.meta.players.find(p => p.id === a.player_id) || {};
      const icon = getActionIcon(a.action_type);
      return `<div class="action-result"><i data-lucide="${icon}" style="color:${p.color||'var(--text-dim)'}"></i> <strong>${p.name || a.player_id}</strong> → ${a.target || a.action_type}</div>`;
    }).join('');
    addMsg(feed, 'referee', 'Actions', lines, 'referee', null, true);
  }

  // Collisions
  if (r.resolution?.collisions?.length) {
    r.resolution.collisions.forEach(c => {
      const names = (c.players || []).map(pid => {
        const p = currentGame.meta.players.find(p => p.id === pid);
        return p?.name || pid;
      }).join(' & ');
      addMsg(feed, 'referee', 'Collision', `
        <div class="collision-flash"><i data-lucide="zap"></i> <strong>${c.location}</strong>: ${names}</div>
        <div style="font-size:0.78rem;color:var(--text-dim)">${esc(c.resolution_rule || '')}</div>
      `, 'referee', null, true);
    });
  }

  // Outcomes
  (r.resolution?.outcomes || []).forEach(o => {
    const p = currentGame.meta.players.find(p => p.id === o.player_id) || {};
    addMsg(feed, p.personality || 'casual', p.name || o.player_id, o.description, '', p.color);
  });

  // Referee flags
  (r.referee_flags || []).forEach(f => {
    addMsg(feed, 'referee', `⚠ ${f.type}`, `${f.description}${f.gsd_section ? ` <span style="color:var(--text-muted)">(${f.gsd_section})</span>` : ''}`, 'flag');
  });

  // Observer notes
  (r.observer_notes || []).forEach(n => {
    addMsg(feed, 'observer', 'Observer', `<span class="msg-badge" style="background:var(--purple);color:#fff">${n.severity || 'note'}</span> ${n.text}`, 'observer');
  });

  // Scroll to bottom
  feed.scrollTop = feed.scrollHeight;

  // Update board & scoreboard
  updateBoardForRound(idx);
  updateScoreboard(idx);
  lucide.createIcons();
}

function addMsg(container, personality, name, content, bubbleClass, color, isHtml) {
  const iconName = PERSONALITY_ICONS[personality] || 'bot';
  const bgColor = color || (personality === 'referee' ? 'var(--primary-dim)' : personality === 'observer' ? 'var(--purple)' : 'var(--surface-3)');
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.innerHTML = `
    <div class="msg-avatar" style="background:${bgColor}"><i data-lucide="${iconName}"></i></div>
    <div class="msg-body">
      <div class="msg-name" style="color:${color || 'var(--text-dim)'}">${esc(name)}</div>
      <div class="msg-bubble ${bubbleClass || ''}">${isHtml ? content : esc(content)}</div>
    </div>`;
  container.appendChild(msg);
}

function getActionIcon(type) {
  const map = {
    select_location: 'map-pin',
    play_card: 'layers',
    trade: 'arrow-left-right',
    bid: 'gavel',
    roll_dice: 'dice-5',
    move: 'move',
    activate_ability: 'sparkles',
    collect: 'package',
    convert: 'repeat',
    investigate: 'search',
    push_luck: 'flame'
  };
  return map[type] || 'circle';
}

// ============================================================
// SCOREBOARD
// ============================================================
function updateScoreboard(roundIdx) {
  const el = document.getElementById('scoreboard');
  const supEl = document.getElementById('supply-info');
  if (!currentGame) return;

  const r = currentGame.rounds[roundIdx];
  const state = r?.state_after;
  const players = currentGame.meta.players || [];

  // Find leader
  let maxScore = -1, leaderId = null;
  if (state?.players) {
    state.players.forEach(ps => {
      const score = ps.case_files_complete ?? ps.score ?? ps.tokens ?? 0;
      if (score > maxScore) { maxScore = score; leaderId = ps.player_id; }
    });
  }

  el.innerHTML = players.map((p, i) => {
    const ps = state?.players?.find(s => s.player_id === p.id) || {};
    const score = ps.case_files_complete ?? ps.score ?? ps.tokens ?? '—';
    const target = ps.case_files_target ? `/ ${ps.case_files_target}` : '';
    const isLeader = p.id === leaderId;
    const iconName = PERSONALITY_ICONS[p.personality] || 'user';
    return `
      <div class="player-card ${isLeader ? 'leader' : ''}">
        <div class="player-avatar" style="background:${p.color || PLAYER_COLORS[i]}">
          <i data-lucide="${iconName}"></i>
        </div>
        <div class="player-info">
          <div class="player-card-name">${esc(p.name || 'Player')}</div>
          <div class="player-role">${p.personality || ''}</div>
        </div>
        <div class="player-score-block">
          <div class="player-score-num">${score} ${target}</div>
        </div>
      </div>`;
  }).join('');

  // Supply
  if (state?.supply) {
    const s = state.supply;
    const pct = s.tokens_total ? Math.round((s.tokens_remaining / s.tokens_total) * 100) : 0;
    supEl.innerHTML = `
      <div class="supply-bar-track"><div class="supply-bar-fill" style="width:${pct}%"></div></div>
      <div class="supply-label">
        <span>Tokens: ${s.tokens_remaining ?? '?'} / ${s.tokens_total ?? '?'}</span>
        <span>${pct}%</span>
      </div>
      ${s.case_files_claimed != null ? `<div style="font-size:0.78rem;color:var(--text-dim);margin-top:0.3rem">Sets claimed: ${s.case_files_claimed} / ${s.case_files_total || '?'}</div>` : ''}`;
  } else {
    supEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem">No supply data</div>';
  }

  lucide.createIcons();
}

// ============================================================
// LIVE POLLING
// ============================================================
function startPolling() {
  setBadge('LIVE');
  const poll = setInterval(async () => {
    try {
      const fn = `game-${String(currentGame.meta.game_number).padStart(2,'0')}-${currentGame.meta.player_count}p.json`;
      const r = await fetch(`${BASE}/${ORDER}/games/${fn}?_=${Date.now()}`);
      if (!r.ok) return;
      const fresh = await r.json();
      if (fresh.rounds?.length > currentGame.rounds.length) {
        currentGame = fresh;
        buildTimeline();
        goRound(currentGame.rounds.length - 1);
      }
      if (fresh.meta.status === 'complete') {
        clearInterval(poll);
        currentGame = fresh;
        buildTimeline();
        goRound(currentGame.rounds.length - 1);
        const gaps = fresh.final_analysis?.rule_gaps_found || 0;
        setBadge(gaps > 3 ? 'FAIL' : gaps > 0 ? 'GUARDRAIL' : 'PASS');
      }
    } catch(e) {}
  }, 15000);
}

// ============================================================
// UTILS
// ============================================================
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// INIT
// ============================================================
gsap.registerPlugin(TextPlugin);
lucide.createIcons();
loadData();
</script>
