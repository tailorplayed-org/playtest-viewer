<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>TailorPlayed — Playtest Viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23120022'/><text x='50' y='68' text-anchor='middle' font-size='60'>&#x1f3b2;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CSS @PROPERTY FOR ANIMATED GRADIENTS
   ═══════════════════════════════════════════════ */
@property --grad-h1 { syntax: '<number>'; initial-value: 250; inherits: false; }
@property --grad-h2 { syntax: '<number>'; initial-value: 140; inherits: false; }
@property --grad-opacity { syntax: '<number>'; initial-value: 0.12; inherits: false; }

/* ═══════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════ */
:root {
  /* Background Scale */
  --c-bg: #120022;
  --c-bg-secondary: #1e0038;
  --c-bg-tertiary: #2d0052;
  --c-bg-elevated: #3d006d;
  --c-brand-purple: #3c0366;
  --c-bg-surface: #1e0038;
  --c-bg-card: #2d0052;
  /* Accent Colors */
  --c-accent: #fcb700;
  --c-accent-light: #ffd54f;
  --c-accent-glow: rgba(252, 183, 0, 0.25);
  /* Primary (theme engine base = brand purple) */
  --c-primary: #3c0366;
  --c-primary-light: #5a0099;
  --c-primary-dim: #2a0049;
  /* Text Colors */
  --c-text: #ffd54f;
  --c-text-secondary: rgba(255, 213, 79, 0.7);
  --c-text-muted: rgba(255, 213, 79, 0.5);
  --c-text-dim: rgba(255, 213, 79, 0.35);
  /* Borders */
  --c-border: rgba(255, 213, 79, 0.2);
  --c-border-subtle: rgba(255, 213, 79, 0.12);
  /* Surface aliases */
  --c-surface: #2d0052;
  --c-surface-hover: #3d006d;
  --c-gold: #fcb700;
  /* Semantic Colors */
  --c-success: #00BA7B;
  --c-warning: #FA9700;
  --c-error: #ff4d6d;
  --c-info: #2A7EFF;
  --c-alien: #22C55E;
  --c-alien-dim: #16A34A;
  --c-verdict-pass: #22C55E;
  --c-verdict-guardrail: #EAB308;
  --c-verdict-fail: #EF4444;
  --token-green: #22C55E;
  --token-brown: #A16207;
  --token-darkred: #DC2626;
  --token-orange: #EA580C;
  --token-blue: #3B82F6;
  /* Typography */
  --font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-heading: 'Fredoka', sans-serif;
  --font-body: 'Fredoka', sans-serif;
  --text-2xl: 2.5rem;
  --text-xl: 1.875rem;
  --text-lg: 1.25rem;
  --text-base: 1.125rem;
  --text-sm: 1rem;
  --text-xs: 0.875rem;
  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.35);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.55);
  --shadow-glow: 0 0 25px rgba(252, 183, 0, 0.25);
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;
  --transition-slow: 500ms ease-out;
  /* Misc */
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ═══════════════════════════════════════════════
   MOOD OVERRIDES
   ═══════════════════════════════════════════════ */
[data-mood="whimsical"] {
  --radius-sm: 14px; --radius-md: 18px; --radius-lg: 22px; --radius-xl: 28px;
}
[data-mood="whimsical"] .bubble { border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
[data-mood="whimsical"] .game-card { border-radius: var(--radius-lg); }

[data-mood="tactical"] {
  --radius-sm: 2px; --radius-md: 3px; --radius-lg: 4px; --radius-xl: 6px;
}
[data-mood="tactical"] h1, [data-mood="tactical"] h2,
[data-mood="tactical"] h3, [data-mood="tactical"] h4,
[data-mood="tactical"] .header__title,
[data-mood="tactical"] .game-card__num,
[data-mood="tactical"] .player-card__name {
  text-transform: uppercase; letter-spacing: 0.06em;
}

[data-mood="cozy"] {
  --radius-sm: 12px; --radius-md: 16px; --radius-lg: 20px; --radius-xl: 24px;
}

[data-mood="intense"] {
  --radius-sm: 3px; --radius-md: 5px; --radius-lg: 8px; --radius-xl: 10px;
}
[data-mood="intense"] .bubble { border-left-width: 4px; }
[data-mood="intense"] .timeline__round--active { box-shadow: 0 0 16px rgba(252,183,0,0.6); }

[data-mood="western"] {
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 16px;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 15% 5%, hsla(var(--grad-h1), 80%, 50%, var(--grad-opacity)) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 95%, hsla(var(--grad-h2), 60%, 40%, 0.06) 0%, transparent 50%);
  transition: --grad-h1 2s ease, --grad-h2 2s ease, --grad-opacity 1.5s ease;
}
h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; color: var(--c-accent); }
button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--c-accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-brand-purple); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #5a0099; }
* { scrollbar-width: thin; scrollbar-color: var(--c-brand-purple) transparent; }
::selection { background-color: var(--c-accent); color: var(--c-bg); }

button, .btn {
  font-family: var(--font-family);
  font-weight: 500;
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  cursor: pointer;
}

.view { display: none; }
.view.active { display: flex; }

.glass {
  background: rgba(30, 0, 56, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--c-border-subtle);
  border-radius: var(--radius-md);
}

.icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 1em; height: 1em; flex-shrink: 0;
}
.icon svg {
  width: 100%; height: 100%;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.icon--sm { width: 14px; height: 14px; }
.icon--md { width: 18px; height: 18px; }
.icon--lg { width: 24px; height: 24px; }
.icon--xl { width: 32px; height: 32px; }
.icon--fill svg { fill: currentColor; stroke: none; }

/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: rgba(18, 0, 34, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--c-border-subtle);
}
.header__alien {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  animation: alien-bob 3s ease-in-out infinite;
}
.header__title { font-size: 1.1rem; font-weight: 600; flex: 1; }
.header__title span { color: var(--c-alien); }
.header__game-title {
  font-size: 0.85rem; color: var(--c-text-muted);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header__back {
  padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
  background: var(--c-border-subtle); border-radius: var(--radius-sm);
  transition: background 0.2s;
}
.header__back:hover { background: var(--c-border); }
.header__verdict {
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
}
.header__verdict--pass { background: rgba(34,197,94,0.2); color: var(--c-verdict-pass); }
.header__verdict--guardrail { background: rgba(234,179,8,0.2); color: var(--c-verdict-guardrail); }
.header__verdict--fail { background: rgba(239,68,68,0.2); color: var(--c-verdict-fail); }

/* ═══════════════════════════════════════════════
   LOADING VIEW
   ═══════════════════════════════════════════════ */
#loading-view {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; gap: 20px;
}
.loader {
  width: 48px; height: 48px;
  border: 4px solid var(--c-border-subtle);
  border-top-color: var(--c-alien);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loader-text { color: var(--c-text-muted); font-size: 0.9rem; }

/* ═══════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════ */
#empty-view {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; gap: 24px; text-align: center; padding: 24px;
}
.alien-char {
  position: relative; width: 100px; height: 120px;
  animation: alien-float 4s ease-in-out infinite;
}
.alien-char__head {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 70px; height: 80px;
  background: var(--c-alien);
  border-radius: 50% 50% 45% 45%;
  box-shadow: 0 0 30px rgba(34,197,94,0.3);
}
.alien-char__eye {
  position: absolute; top: 28px; width: 18px; height: 22px;
  background: #120022; border-radius: 50%;
  animation: blink 4s ease-in-out infinite;
}
.alien-char__eye--l { left: 14px; }
.alien-char__eye--r { right: 14px; }
.alien-char__eye::after {
  content: ''; position: absolute; top: 5px; left: 5px;
  width: 7px; height: 7px; background: #fff; border-radius: 50%;
}
.alien-char__antenna {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 20px; background: var(--c-alien-dim);
}
.alien-char__antenna::after {
  content: ''; position: absolute; top: -6px; left: -4px;
  width: 10px; height: 10px; background: var(--c-alien);
  border-radius: 50%; animation: glow-pulse 2s ease-in-out infinite;
}
.alien-char__body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 44px; height: 40px;
  background: var(--c-alien-dim);
  border-radius: 10px 10px 16px 16px;
}
.empty-title { font-size: 1.5rem; color: var(--c-text); }
.empty-subtitle { color: var(--c-text-muted); font-size: 0.95rem; max-width: 400px; line-height: 1.6; }
.empty-cmd {
  display: inline-block; padding: 8px 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem; background: var(--c-bg-surface); border: 1px solid var(--c-border-subtle);
  border-radius: var(--radius-sm); color: var(--c-alien);
}

/* ═══════════════════════════════════════════════
   SUMMARY VIEW
   ═══════════════════════════════════════════════ */
#summary-view {
  flex-direction: column; padding: 20px 16px; gap: 20px;
  max-width: 960px; margin: 0 auto; width: 100%;
}
.summary__banner {
  padding: 16px 20px; border-radius: var(--radius-lg);
  display: flex; align-items: center; gap: 12px;
  font-weight: 600;
}
.summary__banner--pass { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--c-verdict-pass); }
.summary__banner--guardrail { background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.3); color: var(--c-verdict-guardrail); }
.summary__banner--fail { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--c-verdict-fail); }
.summary__banner-icon { font-size: 1.4rem; }
.summary__banner-text { flex: 1; font-size: 0.95rem; }

.summary__meta {
  display: flex; flex-wrap: wrap; gap: 8px 16px;
  color: var(--c-text-muted); font-size: 0.85rem;
}
.summary__meta strong { color: var(--c-text); }

.summary__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.game-card {
  padding: 16px; border-radius: var(--radius-lg);
  background: rgba(45,0,82,0.6);
  border: 1px solid var(--c-border-subtle);
  cursor: pointer; transition: all 0.25s ease;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-md);
}
.game-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.game-card--pass::before { background: var(--c-verdict-pass); }
.game-card--guardrail::before { background: var(--c-verdict-guardrail); }
.game-card--fail::before { background: var(--c-verdict-fail); }
.game-card:hover {
  border-color: var(--c-accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow-glow);
  background: rgba(61,0,109,0.7);
}
.game-card__header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.game-card__num { font-family: var(--font-heading); font-size: 1rem; font-weight: 600; }
.game-card__badge {
  padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
  background: rgba(252,183,0,0.15); color: var(--c-accent);
}
.game-card__winner {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.9rem; margin-bottom: 8px;
}
.game-card__winner-name { font-weight: 600; color: var(--c-gold); }
.game-card__stats {
  display: flex; gap: 12px; font-size: 0.8rem; color: var(--c-text-muted);
}
.atropos { cursor: pointer; }
.game-card__stat { display: flex; align-items: center; gap: 4px; }

/* ═══════════════════════════════════════════════
   REPLAY VIEW
   ═══════════════════════════════════════════════ */
#replay-view {
  flex-direction: column; height: calc(100vh - 57px); height: calc(100dvh - 57px);
}
.replay-layout {
  display: grid; flex: 1; min-height: 0; overflow: hidden;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr 1fr auto;
  grid-template-areas: "timeline" "board" "commentary" "scoreboard";
}
.replay-layout--no-board {
  grid-template-rows: auto 1fr auto;
  grid-template-areas: "timeline" "commentary" "scoreboard";
}
.replay-layout--no-board .board { display: none; }
.replay-layout--no-board .commentary { border-left: none; }

/* ═══════════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════════ */
.timeline {
  grid-area: timeline;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: rgba(18,0,34,0.6);
  border-bottom: 1px solid var(--c-border-subtle);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.timeline__controls {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.timeline__btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 0.85rem;
  transition: background 0.2s;
}
.timeline__btn:hover { background: var(--c-border-subtle); }
.timeline__btn:disabled { opacity: 0.3; cursor: not-allowed; }
.timeline__btn--play {
  background: var(--c-accent); color: var(--c-bg); width: 36px; height: 36px;
  border-radius: 50%; font-size: 0.9rem; font-weight: 600;
}
.timeline__btn--play:hover { background: var(--c-accent-light); box-shadow: var(--shadow-glow); }
.timeline__btn--play.playing { background: var(--c-accent-light); }

.timeline__rounds {
  display: flex; align-items: center; gap: 4px; flex: 1;
  overflow-x: auto; padding: 4px 0;
  scrollbar-width: none;
}
.timeline__rounds::-webkit-scrollbar { display: none; }

.timeline__round {
  width: 32px; height: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 0.75rem; font-weight: 600;
  background: var(--c-bg-surface); border: 2px solid var(--c-border-subtle);
  cursor: pointer; transition: all 0.2s;
}
.timeline__round:hover { border-color: var(--c-accent); }
.timeline__round--active {
  background: var(--c-accent); border-color: var(--c-accent-light); color: var(--c-bg);
  transform: scale(1.15); box-shadow: 0 0 12px rgba(252,183,0,0.4);
}
.timeline__round--collision { border-color: var(--c-verdict-guardrail); }
.timeline__round--flagged { border-color: var(--c-verdict-fail); }

.timeline__info {
  flex-shrink: 0; font-size: 0.8rem; color: var(--c-text-muted);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════
   BOARD
   ═══════════════════════════════════════════════ */
.board {
  grid-area: board; position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 8px; overflow: hidden;
  background: radial-gradient(ellipse at center, rgba(45,0,82,0.4) 0%, transparent 70%);
}
.board svg {
  width: 100%; height: 100%; max-height: 100%;
}
.board svg text { pointer-events: none; user-select: none; }
.loc-card { cursor: default; }
.loc-card rect {
  transition: stroke 0.3s, filter 0.3s;
}
.loc-card.collision rect {
  stroke: var(--c-verdict-guardrail); stroke-width: 3;
  filter: drop-shadow(0 0 8px rgba(234,179,8,0.5));
}
.player-token { transition: opacity 0.2s; }
.player-token circle { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }

/* ═══════════════════════════════════════════════
   COMMENTARY
   ═══════════════════════════════════════════════ */
.commentary {
  grid-area: commentary;
  display: flex; flex-direction: column;
  border-top: 1px solid var(--c-border-subtle);
  min-height: 0;
}
.commentary__header {
  padding: 8px 12px; font-size: 0.8rem; font-weight: 600;
  color: var(--c-text-muted); border-bottom: 1px solid var(--c-border-subtle);
  background: rgba(18,0,34,0.4); flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}
.commentary__feed {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.bubble {
  padding: 10px 12px; border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
  background: var(--c-bg-surface);
  border-left: 3px solid var(--bubble-color, var(--c-border));
  animation: bubble-in 0.3s var(--ease-bounce);
  position: relative;
}
.bubble__header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px; font-size: 0.8rem;
}
.bubble__header .icon { color: var(--c-text-dim); }
.bubble__name { font-weight: 600; color: var(--c-text); }
.bubble__target {
  color: var(--c-text-dim); font-size: 0.75rem;
  display: flex; align-items: center; gap: 3px;
}
.bubble__action-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px; border-radius: 4px; font-size: 0.72rem; font-weight: 600;
  background: rgba(252,183,0,0.12); color: var(--c-accent);
}
.bubble__dice { font-size: 1.3rem; line-height: 1; }
.bubble__thought {
  font-size: 0.85rem; line-height: 1.5; color: var(--c-text-muted);
  min-height: 1.2em;
}
.bubble__tokens {
  display: flex; gap: 3px; margin-top: 6px; flex-wrap: wrap; align-items: center;
}
.bubble__token-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.bubble__case {
  margin-top: 6px; padding: 4px 8px;
  background: rgba(252,183,0,0.15); border-radius: var(--radius-sm);
  font-size: 0.78rem; color: var(--c-gold); font-weight: 600;
}
.bubble--collision-flash {
  animation: collision-flash 0.5s ease-out;
}
.bubble--sparkle::after {
  content: ''; position: absolute; inset: -2px; border-radius: inherit;
  background: transparent; pointer-events: none;
  animation: sparkle-ring 0.6s ease-out forwards;
}

.bubble__thinking {
  margin-top: 6px; padding: var(--space-sm) var(--space-md);
  background: rgba(60, 3, 102, 0.6);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--c-accent);
  display: flex; align-items: flex-start; gap: 6px;
}
.bubble__thinking-icon { flex-shrink: 0; opacity: 0.7; color: var(--c-accent); margin-top: 1px; }
.bubble__thinking-text {
  font-size: 0.85rem; line-height: 1.5;
  color: var(--c-text); font-style: normal;
  min-height: 1.2em;
}
.bubble__action-result {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0; font-size: 0.85rem;
}
.bubble__location-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  background: rgba(252,183,0,0.12);
  border-radius: 6px;
  font-size: 0.8rem; font-weight: 600;
  color: var(--c-accent);
}
.narrator-line {
  padding: 6px 12px; font-size: 0.82rem;
  color: var(--c-text-dim); font-style: italic;
  border-bottom: 1px solid var(--c-border-subtle);
  margin-bottom: 6px; min-height: 1.4em;
  letter-spacing: 0.01em;
}
.system-msg--collision .icon, .system-msg--warning .icon, .system-msg--flag .icon {
  flex-shrink: 0; margin-top: 1px;
}

.system-msg {
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: 0.8rem; text-align: center;
}
.system-msg--collision {
  background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.2);
  color: var(--c-verdict-guardrail);
}
.system-msg--flag {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  color: var(--c-verdict-fail);
}
.system-msg--warning {
  background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.25);
  color: var(--c-verdict-guardrail);
  text-align: left; display: flex; align-items: flex-start; gap: 8px;
  font-weight: 500;
}
.system-msg--info {
  background: rgba(60,3,102,0.15); border: 1px solid rgba(60,3,102,0.3);
  color: var(--c-accent);
}

.outcome-feed {
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: rgba(60,3,102,0.12); border: 1px solid rgba(60,3,102,0.2);
  display: flex; flex-direction: column; gap: 5px;
}
.outcome-feed__title {
  font-size: 0.72rem; font-weight: 600; color: var(--c-text-dim);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px;
}
.outcome-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--c-text-muted); line-height: 1.4;
}
.outcome-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 12px; align-items: center;
}
.typing-indicator span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c-text-dim);
  animation: typing-bounce 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
.typing-label { font-size: 0.75rem; color: var(--c-text-dim); margin-left: 6px; }

/* ═══════════════════════════════════════════════
   SCOREBOARD
   ═══════════════════════════════════════════════ */
.scoreboard {
  grid-area: scoreboard;
  display: flex; gap: 6px; padding: 8px 10px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(18,0,34,0.7);
  border-top: 1px solid var(--c-border-subtle);
  scrollbar-width: none;
}
.scoreboard::-webkit-scrollbar { display: none; }

.player-card {
  flex: 0 0 auto; min-width: 130px; max-width: 170px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--c-bg-surface);
  border: 1.5px solid var(--c-border-subtle);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.player-card--leader {
  border-color: var(--c-gold);
  box-shadow: 0 0 10px rgba(252,183,0,0.2);
}
.player-card__header {
  display: flex; align-items: center; gap: 5px; margin-bottom: 4px;
}
.player-card__avatar {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.player-card__name {
  font-size: 0.78rem; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.player-card__character {
  font-size: 0.68rem; color: var(--c-text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 4px;
}
.player-card__progress {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.player-card__bar {
  flex: 1; height: 6px; background: var(--c-bg);
  border-radius: 3px; overflow: hidden;
}
.player-card__bar-fill {
  height: 100%; border-radius: 3px;
  background: var(--c-accent);
  transition: width 0.6s ease;
}
.player-card__score {
  font-size: 0.75rem; font-weight: 700; white-space: nowrap;
}
.player-card__tokens {
  display: flex; gap: 2px; flex-wrap: wrap;
}
.player-card__token {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
}
.player-card__badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.68rem; margin-top: 3px; color: var(--c-gold);
}

.supply-tracker {
  flex: 0 0 auto; min-width: 90px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--c-bg-surface); border: 1.5px solid var(--c-border-subtle);
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
}
.supply-tracker__label { font-size: 0.7rem; color: var(--c-text-dim); }
.supply-tracker__value { font-size: 1.1rem; font-weight: 700; font-family: var(--font-heading); }
.supply-tracker__bar {
  width: 100%; height: 4px; background: var(--c-bg);
  border-radius: 2px; overflow: hidden;
}
.supply-tracker__bar-fill {
  height: 100%; border-radius: 2px;
  background: var(--c-alien);
  transition: width 0.6s ease;
}

/* ═══════════════════════════════════════════════
   WINNER OVERLAY
   ═══════════════════════════════════════════════ */
.winner-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(18,0,34,0.85); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; text-align: center;
}
.winner-overlay.active { display: flex; }
.winner-overlay__crown { font-size: 3rem; animation: crown-bounce 0.6s var(--ease-bounce); }
.winner-overlay__title {
  font-family: var(--font-heading); font-size: 2rem;
  color: var(--c-gold);
}
.winner-overlay__subtitle { color: var(--c-text-muted); font-size: 1rem; }
.winner-overlay__details {
  display: flex; gap: 20px; color: var(--c-text-muted); font-size: 0.9rem;
}
.winner-overlay__close {
  margin-top: 12px; padding: 10px 28px;
  background: var(--c-accent); color: var(--c-bg);
  border-radius: var(--radius-md); font-weight: 600;
  transition: all 0.2s;
}
.winner-overlay__close:hover { background: var(--c-accent-light); box-shadow: var(--shadow-glow); }

/* ═══════════════════════════════════════════════
   KEYFRAMES
   ═══════════════════════════════════════════════ */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes alien-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes alien-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes blink { 0%,42%,44%,100% { transform: scaleY(1); } 43% { transform: scaleY(0.1); } }
@keyframes glow-pulse { 0%,100% { box-shadow: 0 0 4px rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 12px rgba(34,197,94,0.8); } }
@keyframes typing-bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
@keyframes bubble-in { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes crown-bounce { from { transform: scale(0) rotate(-30deg); } to { transform: scale(1) rotate(0); } }
@keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(252,183,0,0.4); } 70% { box-shadow: 0 0 0 8px rgba(252,183,0,0); } 100% { box-shadow: 0 0 0 0 rgba(252,183,0,0); } }
@keyframes collision-pulse { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
@keyframes collision-flash { 0% { background: rgba(234,179,8,0.25); } 100% { background: var(--c-bg-surface); } }
@keyframes sparkle-ring { 0% { box-shadow: 0 0 0 0 rgba(234,179,8,0.5); } 100% { box-shadow: 0 0 10px 3px rgba(234,179,8,0); } }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (min-width: 768px) {
  .replay-layout {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "timeline timeline"
      "board commentary"
      "scoreboard scoreboard";
  }
  .replay-layout--no-board {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
    grid-template-areas: "timeline" "commentary" "scoreboard";
  }
  .commentary { border-top: none; border-left: 1px solid var(--c-border-subtle); }
  .replay-layout--no-board .commentary { border-left: none; border-top: 1px solid var(--c-border-subtle); }
  .board { padding: 12px; }
}
@media (min-width: 1024px) {
  .replay-layout {
    grid-template-columns: 3fr 2fr;
  }
  .board { padding: 16px; }
  .scoreboard { padding: 10px 16px; gap: 8px; }
}
@media (min-width: 1440px) {
  #summary-view { max-width: 1100px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

// Icons from game-icons.net use fill (512x512) instead of Lucide stroke (24x24)
const FILL_ICONS = new Set([
  'crown', 'shield', 'coins', 'dices', 'target', 'eye', 'brain',
  'zap', 'flag', 'search', 'shuffle', 'alert-tri', 'check-circ', 'arrow-lr'
]);

function icon(name, sizeClass) {
  const paths = ICONS[name];
  if (!paths) return '';
  const isFill = FILL_ICONS.has(name);
  const cls = sizeClass
    ? `icon${isFill ? ' icon--fill' : ''} ${sizeClass}`
    : `icon${isFill ? ' icon--fill' : ''}`;
  const vb = isFill ? '0 0 512 512' : '0 0 24 24';
  return `<span class="${cls}"><svg viewBox="${vb}">${paths}</svg></span>`;
}

function iconSvgOnly(name) {
  return ICONS[name] || '';
}

function iconViewBox(name) {
  return FILL_ICONS.has(name) ? '0 0 512 512' : '0 0 24 24';
}

function iconIsFill(name) {
  return FILL_ICONS.has(name);
}

  green: '#22C55E', brown: '#A16207', darkred: '#DC2626',
  orange: '#EA580C', blue: '#3B82F6', red: '#EF4444',
  yellow: '#EAB308', purple: '#A855F7', pink: '#EC4899',
  white: '#F1F5F9', black: '#374151', gray: '#6B7280', grey: '#6B7280'
};

function tokenColor(name) {
  return TOKEN_COLORS[name?.toLowerCase()] || 'rgba(255,213,79,0.5)';
}

function personalityOf(id) { return PERSONALITY[id] || PERSONALITY.casual; }

function ordSuffix(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return 'th';
  switch (n % 10) {
    case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th';
  }
}

function locationIcon(name, special) {
  const l = (name || '').toLowerCase();
  if (l.includes('store') || l.includes('shop') || l.includes('market')) return 'store';
  if (l.includes('reef') || l.includes('beach') || l.includes('sea')) return 'fish';
  if (l.includes('closet') || l.includes('messy')) return 'archive';
  if (l.includes('salon') || l.includes('barber')) return 'scissors';
  if (l.includes('cabin') || l.includes('house') || l.includes('home')) return 'home';
  if (l.includes('hq') || l.includes('headquarters') || l.includes('office')) return 'building';
  if (l.includes('wagon') || l.includes('car') || l.includes('subaru')) return 'car';
  if (l.includes('park') || l.includes('garden')) return 'trees';
  if (l.includes('mine') || l.includes('cave')) return 'pickaxe';
  if (l.includes('saloon') || l.includes('bar')) return 'beer';
  if (l.includes('bank')) return 'landmark';
  if (l.includes('jail') || l.includes('prison')) return 'lock';
  if (l.includes('station') || l.includes('train')) return 'train';
  if (l.includes('forest') || l.includes('wood')) return 'tree-pine';
  if (l.includes('castle') || l.includes('tower')) return 'castle';
  if (l.includes('temple') || l.includes('shrine')) return 'landmark';
  if (l.includes('camp') || l.includes('tent')) return 'tent';
  if (special === 'random_draw') return 'dices';
  if (special === 'peek') return 'eye';
  if (special === 'swap') return 'arrow-lr';
  return 'map-pin';
}

function parseHSL(str) {
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  return { h: parts[0], s: parts[1], l: parts[2] };
}

/* ═══════════════════════════════════════════════
   THEME ENGINE
   ═══════════════════════════════════════════════ */
const ThemeEngine = {
  applied: false,

  applyTheme(game) {
    if (this.applied) return;
    const artStyle = game?.meta?.art_style;
    const theme = THEME_MAP[artStyle] || THEME_MAP.default;
    const root = document.documentElement;

    const p = parseHSL(theme.primary);
    const a = parseHSL(theme.accent);
    const s = parseHSL(theme.surface);
    const t = parseHSL(theme.text);

    // Primary family
    root.style.setProperty('--c-primary', `hsl(${p.h}, ${p.s}%, ${p.l}%)`);
    root.style.setProperty('--c-primary-light', `hsl(${p.h}, ${Math.max(0, p.s - 10)}%, ${Math.min(100, p.l + 15)}%)`);
    root.style.setProperty('--c-primary-dim', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 15)}%)`);

    // Accent
    root.style.setProperty('--c-accent', `hsl(${a.h}, ${a.s}%, ${a.l}%)`);

    // Surface family
    root.style.setProperty('--c-bg', `hsl(${s.h}, ${s.s}%, ${Math.max(0, s.l - 4)}%)`);
    root.style.setProperty('--c-bg-surface', `hsl(${s.h}, ${s.s}%, ${s.l}%)`);
    root.style.setProperty('--c-bg-card', `hsl(${s.h}, ${s.s}%, ${s.l + 5}%)`);

    // Text family
    root.style.setProperty('--c-text', `hsl(${t.h}, ${t.s}%, ${t.l}%)`);
    root.style.setProperty('--c-text-muted', `hsl(${t.h}, ${Math.max(0, t.s - 5)}%, ${Math.max(0, t.l - 30)}%)`);
    root.style.setProperty('--c-text-dim', `hsl(${t.h}, ${Math.max(0, t.s - 10)}%, ${Math.max(0, t.l - 45)}%)`);

    // Borders
    root.style.setProperty('--c-border', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 20)}%)`);
    root.style.setProperty('--c-border-subtle', `hsl(${s.h}, ${s.s}%, ${s.l + 8}%)`);

    // Derived shades
    root.style.setProperty('--primary-dim', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 20)}%)`);
    root.style.setProperty('--primary-glow', `hsla(${p.h}, ${p.s}%, ${p.l}%, 0.3)`);
    root.style.setProperty('--surface-2', `hsl(${s.h}, ${s.s}%, ${s.l + 5}%)`);

    // Fonts
    root.style.setProperty('--font-heading', theme.fontFamily);
    root.style.setProperty('--font-body', theme.fontAccent);

    // Mood attribute
    document.body.setAttribute('data-mood', theme.mood);

    // Background gradient uses theme colors
    document.body.style.backgroundImage =
      `radial-gradient(ellipse at 15% 5%, hsla(${p.h}, ${p.s}%, ${p.l}%, 0.12) 0%, transparent 50%),` +
      `radial-gradient(ellipse at 85% 95%, hsla(${a.h}, ${a.s}%, ${a.l}%, 0.06) 0%, transparent 50%)`;

    // Inject fonts
    this.injectFonts(theme);

    this.applied = true;
  },

  injectFonts(theme) {
    const prev = document.getElementById('theme-fonts');
    if (prev) prev.remove();

    const families = new Set();
    [theme.fontFamily, theme.fontAccent].forEach(f => {
      const match = f.match(/['"]([^'"]+)['"]/);
      if (match && match[1]) families.add(match[1]);
    });

    // Filter out already-loaded fonts
    const loaded = new Set(['Fredoka', 'Nunito', 'Inter']);
    const toLoad = [...families].filter(f => !loaded.has(f));
    if (!toLoad.length) return;

    const url = 'https://fonts.googleapis.com/css2?' +
      toLoad.map(f => `family=${encodeURIComponent(f)}:wght@300;400;500;600;700`).join('&') +
      '&display=swap';

    const link = document.createElement('link');
    link.id = 'theme-fonts';
    link.rel = 'stylesheet';
    link.href = url;
    document.head.appendChild(link);
  }
};

/* ═══════════════════════════════════════════════
   THOUGHT PARSER & NARRATOR
   ═══════════════════════════════════════════════ */
const ThoughtParser = {
  parse(thought, action, locations) {
    if (!thought) return { raw: '', type: 'generic', mentionedLocation: action?.target_name || '' };
    const locNames = (locations || []).map(l => l.name);
    const mentionedLoc = locNames.find(name => thought.includes(name)) || action?.target_name || '';
    let type = 'generic';
    if (/calculates|optimiz/i.test(thought)) type = 'strategist';
    else if (/follows.*optimal|per rules/i.test(thought)) type = 'rules-lawyer';
    else if (/sounds interesting|let.*see/i.test(thought)) type = 'casual';
    else if (/nobody expects|random|chaos/i.test(thought)) type = 'chaotic';
    else if (/testing.*rule|edge case/i.test(thought)) type = 'edge-case';
    return { raw: thought, type, mentionedLocation: mentionedLoc };
  }
};

const Narrator = {
  narrateRound(round, prevRound, game) {
    const msgs = [];
    if (!round?.state_after) return msgs;
    const winTarget = game.meta.win_target || 3;
    const players = round.state_after.players || [];
    const scores = players.map(p => p.cases_completed ?? p.score ?? 0);
    const maxScore = Math.max(...scores);
    const leader = players.find(p => (p.cases_completed ?? p.score ?? 0) === maxScore);
    const roundNum = round.number ?? round.round_number ?? 0;

    // Score changes
    if (prevRound?.state_after?.players) {
      players.forEach(curr => {
        const prev = prevRound.state_after.players.find(p => p.id === curr.id);
        const prevS = prev?.cases_completed ?? prev?.score ?? 0;
        const currS = curr.cases_completed ?? curr.score ?? 0;
        if (currS > prevS) {
          msgs.push({ type: 'info', text: `${curr.name} closes a case! ${prevS} \u2192 ${currS}` });
        }
      });
    }

    // Near-win
    if (leader && maxScore === winTarget - 1) {
      msgs.push({ type: 'warning', text: `${leader.name} is one case away from victory!` });
    }

    // Tied scores (2+ rounds in)
    if (roundNum > 1 && scores.length > 1 && scores.every(s => s === scores[0]) && scores[0] > 0) {
      msgs.push({ type: 'info', text: 'Dead even. Nobody has an edge yet.' });
    }

    // Bag running low
    const bag = round.state_after.bag_count;
    if (bag != null && bag <= 5) {
      msgs.push({ type: 'warning', text: `Only ${bag} tokens left in the supply bag!` });
    }

    // Empty locations
    (round.state_after.locations || []).forEach(loc => {
      if (loc.tokens && loc.tokens.length === 0) {
        msgs.push({ type: 'info', text: `${loc.name} is empty \u2014 the well runs dry.` });
      }
    });

    return msgs;
  }
};
