<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Playtest Viewer — TailorPlayed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════ */
:root {
  --c-primary: #7C3AED;
  --c-primary-light: #A78BFA;
  --c-primary-dim: #5B21B6;
  --c-accent: #F43F5E;
  --c-bg: #0F0F23;
  --c-bg-surface: #1A1A2E;
  --c-bg-card: #16213E;
  --c-text: #E2E8F0;
  --c-text-muted: #94A3B8;
  --c-text-dim: #64748B;
  --c-border: #4C1D95;
  --c-border-subtle: #2D2B55;
  --c-gold: #fcb700;
  --c-alien: #22C55E;
  --c-alien-dim: #16A34A;
  --c-verdict-pass: #22C55E;
  --c-verdict-guardrail: #EAB308;
  --c-verdict-fail: #EF4444;
  --token-green: #22C55E;
  --token-brown: #A16207;
  --token-darkred: #DC2626;
  --token-orange: #EA580C;
  --token-blue: #3B82F6;
  --font-heading: 'Fredoka', sans-serif;
  --font-body: 'Nunito', sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ═══════════════════════════════════════════════
   MOOD OVERRIDES
   ═══════════════════════════════════════════════ */
[data-mood="whimsical"] {
  --radius-sm: 14px; --radius-md: 18px; --radius-lg: 22px; --radius-xl: 28px;
}
[data-mood="whimsical"] .bubble { border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
[data-mood="whimsical"] .game-card { border-radius: var(--radius-lg); }

[data-mood="tactical"] {
  --radius-sm: 2px; --radius-md: 3px; --radius-lg: 4px; --radius-xl: 6px;
}
[data-mood="tactical"] h1, [data-mood="tactical"] h2,
[data-mood="tactical"] h3, [data-mood="tactical"] h4,
[data-mood="tactical"] .header__title,
[data-mood="tactical"] .game-card__num,
[data-mood="tactical"] .player-card__name {
  text-transform: uppercase; letter-spacing: 0.06em;
}

[data-mood="cozy"] {
  --radius-sm: 12px; --radius-md: 16px; --radius-lg: 20px; --radius-xl: 24px;
}

[data-mood="intense"] {
  --radius-sm: 3px; --radius-md: 5px; --radius-lg: 8px; --radius-xl: 10px;
}
[data-mood="intense"] .bubble { border-left-width: 4px; }
[data-mood="intense"] .timeline__round--active { box-shadow: 0 0 16px rgba(124,58,237,0.6); }

[data-mood="western"] {
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 16px;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 15% 5%, rgba(124,58,237,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 95%, rgba(34,197,94,0.06) 0%, transparent 50%);
}
h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; }
button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--c-primary-light); text-decoration: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }

.view { display: none; }
.view.active { display: flex; }

.glass {
  background: rgba(22, 33, 62, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--c-border-subtle);
  border-radius: var(--radius-md);
}

/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: rgba(15, 15, 35, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--c-border-subtle);
}
.header__alien {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  animation: alien-bob 3s ease-in-out infinite;
}
.header__title { font-size: 1.1rem; font-weight: 600; flex: 1; }
.header__title span { color: var(--c-alien); }
.header__game-title {
  font-size: 0.85rem; color: var(--c-text-muted);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header__back {
  padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
  background: var(--c-border-subtle); border-radius: var(--radius-sm);
  transition: background 0.2s;
}
.header__back:hover { background: var(--c-border); }
.header__verdict {
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
}
.header__verdict--pass { background: rgba(34,197,94,0.2); color: var(--c-verdict-pass); }
.header__verdict--guardrail { background: rgba(234,179,8,0.2); color: var(--c-verdict-guardrail); }
.header__verdict--fail { background: rgba(239,68,68,0.2); color: var(--c-verdict-fail); }

/* ═══════════════════════════════════════════════
   LOADING VIEW
   ═══════════════════════════════════════════════ */
#loading-view {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; gap: 20px;
}
.loader {
  width: 48px; height: 48px;
  border: 4px solid var(--c-border-subtle);
  border-top-color: var(--c-alien);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loader-text { color: var(--c-text-muted); font-size: 0.9rem; }

/* ═══════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════ */
#empty-view {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; gap: 24px; text-align: center; padding: 24px;
}
.alien-char {
  position: relative; width: 100px; height: 120px;
  animation: alien-float 4s ease-in-out infinite;
}
.alien-char__head {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 70px; height: 80px;
  background: var(--c-alien);
  border-radius: 50% 50% 45% 45%;
  box-shadow: 0 0 30px rgba(34,197,94,0.3);
}
.alien-char__eye {
  position: absolute; top: 28px; width: 18px; height: 22px;
  background: #0F0F23; border-radius: 50%;
  animation: blink 4s ease-in-out infinite;
}
.alien-char__eye--l { left: 14px; }
.alien-char__eye--r { right: 14px; }
.alien-char__eye::after {
  content: ''; position: absolute; top: 5px; left: 5px;
  width: 7px; height: 7px; background: #fff; border-radius: 50%;
}
.alien-char__antenna {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 20px; background: var(--c-alien-dim);
}
.alien-char__antenna::after {
  content: ''; position: absolute; top: -6px; left: -4px;
  width: 10px; height: 10px; background: var(--c-alien);
  border-radius: 50%; animation: glow-pulse 2s ease-in-out infinite;
}
.alien-char__body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 44px; height: 40px;
  background: var(--c-alien-dim);
  border-radius: 10px 10px 16px 16px;
}
.empty-title { font-size: 1.5rem; color: var(--c-text); }
.empty-subtitle { color: var(--c-text-muted); font-size: 0.95rem; max-width: 400px; line-height: 1.6; }
.empty-cmd {
  display: inline-block; padding: 8px 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem; background: var(--c-bg-surface); border: 1px solid var(--c-border-subtle);
  border-radius: var(--radius-sm); color: var(--c-alien);
}

/* ═══════════════════════════════════════════════
   SUMMARY VIEW
   ═══════════════════════════════════════════════ */
#summary-view {
  flex-direction: column; padding: 20px 16px; gap: 20px;
  max-width: 960px; margin: 0 auto; width: 100%;
}
.summary__banner {
  padding: 16px 20px; border-radius: var(--radius-lg);
  display: flex; align-items: center; gap: 12px;
  font-weight: 600;
}
.summary__banner--pass { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--c-verdict-pass); }
.summary__banner--guardrail { background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.3); color: var(--c-verdict-guardrail); }
.summary__banner--fail { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--c-verdict-fail); }
.summary__banner-icon { font-size: 1.4rem; }
.summary__banner-text { flex: 1; font-size: 0.95rem; }

.summary__meta {
  display: flex; flex-wrap: wrap; gap: 8px 16px;
  color: var(--c-text-muted); font-size: 0.85rem;
}
.summary__meta strong { color: var(--c-text); }

.summary__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.game-card {
  padding: 16px; border-radius: var(--radius-md);
  background: rgba(22,33,62,0.6);
  border: 1px solid var(--c-border-subtle);
  cursor: pointer; transition: all 0.25s ease;
  position: relative; overflow: hidden;
}
.game-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.game-card--pass::before { background: var(--c-verdict-pass); }
.game-card--guardrail::before { background: var(--c-verdict-guardrail); }
.game-card--fail::before { background: var(--c-verdict-fail); }
.game-card:hover {
  border-color: var(--c-primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(124,58,237,0.15);
}
.game-card__header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.game-card__num { font-family: var(--font-heading); font-size: 1rem; font-weight: 600; }
.game-card__badge {
  padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
  background: rgba(124,58,237,0.2); color: var(--c-primary-light);
}
.game-card__winner {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.9rem; margin-bottom: 8px;
}
.game-card__winner-name { font-weight: 600; color: var(--c-gold); }
.game-card__stats {
  display: flex; gap: 12px; font-size: 0.8rem; color: var(--c-text-muted);
}
.game-card__stat { display: flex; align-items: center; gap: 4px; }

/* ═══════════════════════════════════════════════
   REPLAY VIEW
   ═══════════════════════════════════════════════ */
#replay-view {
  flex-direction: column; height: calc(100vh - 57px); height: calc(100dvh - 57px);
}
.replay-layout {
  display: grid; flex: 1; min-height: 0; overflow: hidden;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr 1fr auto;
  grid-template-areas: "timeline" "board" "commentary" "scoreboard";
}
.replay-layout--no-board {
  grid-template-rows: auto 1fr auto;
  grid-template-areas: "timeline" "commentary" "scoreboard";
}
.replay-layout--no-board .board { display: none; }
.replay-layout--no-board .commentary { border-left: none; }

/* ═══════════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════════ */
.timeline {
  grid-area: timeline;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: rgba(15,15,35,0.6);
  border-bottom: 1px solid var(--c-border-subtle);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.timeline__controls {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.timeline__btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 0.85rem;
  transition: background 0.2s;
}
.timeline__btn:hover { background: var(--c-border-subtle); }
.timeline__btn:disabled { opacity: 0.3; cursor: not-allowed; }
.timeline__btn--play {
  background: var(--c-primary); color: #fff; width: 36px; height: 36px;
  border-radius: 50%; font-size: 0.9rem;
}
.timeline__btn--play:hover { background: var(--c-primary-dim); }
.timeline__btn--play.playing { background: var(--c-accent); }

.timeline__rounds {
  display: flex; align-items: center; gap: 4px; flex: 1;
  overflow-x: auto; padding: 4px 0;
  scrollbar-width: none;
}
.timeline__rounds::-webkit-scrollbar { display: none; }

.timeline__round {
  width: 32px; height: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 0.75rem; font-weight: 600;
  background: var(--c-bg-surface); border: 2px solid var(--c-border-subtle);
  cursor: pointer; transition: all 0.2s;
}
.timeline__round:hover { border-color: var(--c-primary-light); }
.timeline__round--active {
  background: var(--c-primary); border-color: var(--c-primary-light);
  transform: scale(1.15); box-shadow: 0 0 12px rgba(124,58,237,0.4);
}
.timeline__round--collision { border-color: var(--c-verdict-guardrail); }
.timeline__round--flagged { border-color: var(--c-verdict-fail); }

.timeline__info {
  flex-shrink: 0; font-size: 0.8rem; color: var(--c-text-muted);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════
   BOARD
   ═══════════════════════════════════════════════ */
.board {
  grid-area: board; position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 8px; overflow: hidden;
  background: radial-gradient(ellipse at center, rgba(22,33,62,0.4) 0%, transparent 70%);
}
.board svg {
  width: 100%; height: 100%; max-height: 100%;
}
.board svg text { pointer-events: none; user-select: none; }
.loc-card { cursor: default; }
.loc-card rect {
  transition: stroke 0.3s, filter 0.3s;
}
.loc-card.collision rect {
  stroke: var(--c-verdict-guardrail); stroke-width: 3;
  filter: drop-shadow(0 0 8px rgba(234,179,8,0.5));
}
.player-token { transition: opacity 0.2s; }
.player-token circle { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }

/* ═══════════════════════════════════════════════
   COMMENTARY
   ═══════════════════════════════════════════════ */
.commentary {
  grid-area: commentary;
  display: flex; flex-direction: column;
  border-top: 1px solid var(--c-border-subtle);
  min-height: 0;
}
.commentary__header {
  padding: 8px 12px; font-size: 0.8rem; font-weight: 600;
  color: var(--c-text-muted); border-bottom: 1px solid var(--c-border-subtle);
  background: rgba(15,15,35,0.4); flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}
.commentary__feed {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.bubble {
  padding: 10px 12px; border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
  background: var(--c-bg-surface);
  border-left: 3px solid var(--bubble-color, var(--c-border));
  animation: bubble-in 0.3s var(--ease-bounce);
  position: relative;
}
.bubble__header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px; font-size: 0.8rem;
}
.bubble__emoji { font-size: 1rem; }
.bubble__name { font-weight: 600; color: var(--c-text); }
.bubble__target {
  color: var(--c-text-dim); font-size: 0.75rem;
  display: flex; align-items: center; gap: 3px;
}
.bubble__action-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px; border-radius: 4px; font-size: 0.72rem; font-weight: 600;
  background: rgba(124,58,237,0.12); color: var(--c-primary-light);
}
.bubble__dice { font-size: 1.3rem; line-height: 1; }
.bubble__thought {
  font-size: 0.85rem; line-height: 1.5; color: var(--c-text-muted);
  min-height: 1.2em;
}
.bubble__tokens {
  display: flex; gap: 3px; margin-top: 6px; flex-wrap: wrap; align-items: center;
}
.bubble__token-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.bubble__case {
  margin-top: 6px; padding: 4px 8px;
  background: rgba(252,183,0,0.15); border-radius: var(--radius-sm);
  font-size: 0.78rem; color: var(--c-gold); font-weight: 600;
}
.bubble--collision-flash {
  animation: collision-flash 0.5s ease-out;
}
.bubble--sparkle::after {
  content: ''; position: absolute; inset: -2px; border-radius: inherit;
  background: transparent; pointer-events: none;
  animation: sparkle-ring 0.6s ease-out forwards;
}

.system-msg {
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: 0.8rem; text-align: center;
}
.system-msg--collision {
  background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.2);
  color: var(--c-verdict-guardrail);
}
.system-msg--flag {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  color: var(--c-verdict-fail);
}
.system-msg--warning {
  background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.25);
  color: var(--c-verdict-guardrail);
  text-align: left; display: flex; align-items: flex-start; gap: 8px;
  font-weight: 500;
}
.system-msg--info {
  background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2);
  color: var(--c-primary-light);
}

.outcome-feed {
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.12);
  display: flex; flex-direction: column; gap: 5px;
}
.outcome-feed__title {
  font-size: 0.72rem; font-weight: 600; color: var(--c-text-dim);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px;
}
.outcome-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--c-text-muted); line-height: 1.4;
}
.outcome-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 12px; align-items: center;
}
.typing-indicator span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c-text-dim);
  animation: typing-bounce 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
.typing-label { font-size: 0.75rem; color: var(--c-text-dim); margin-left: 6px; }

/* ═══════════════════════════════════════════════
   SCOREBOARD
   ═══════════════════════════════════════════════ */
.scoreboard {
  grid-area: scoreboard;
  display: flex; gap: 6px; padding: 8px 10px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(15,15,35,0.7);
  border-top: 1px solid var(--c-border-subtle);
  scrollbar-width: none;
}
.scoreboard::-webkit-scrollbar { display: none; }

.player-card {
  flex: 0 0 auto; min-width: 130px; max-width: 170px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--c-bg-surface);
  border: 1.5px solid var(--c-border-subtle);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.player-card--leader {
  border-color: var(--c-gold);
  box-shadow: 0 0 10px rgba(252,183,0,0.2);
}
.player-card__header {
  display: flex; align-items: center; gap: 5px; margin-bottom: 4px;
}
.player-card__avatar {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.player-card__name {
  font-size: 0.78rem; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.player-card__character {
  font-size: 0.68rem; color: var(--c-text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 4px;
}
.player-card__progress {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.player-card__bar {
  flex: 1; height: 6px; background: var(--c-bg);

<script>
/* ═══════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════ */
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
const svgNS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const el = document.createElementNS(svgNS, tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

const PERSONALITY = {
  strategist: { emoji: '\uD83C\uDFAF', label: 'Strategist', fallbackColor: '#3B82F6' },
  casual: { emoji: '\uD83C\uDFB2', label: 'Casual', fallbackColor: '#F97316' },
  'rules-lawyer': { emoji: '\uD83D\uDCCF', label: 'Rules Lawyer', fallbackColor: '#22C55E' },
  chaotic: { emoji: '\uD83C\uDCCF', label: 'Chaotic', fallbackColor: '#A855F7' },
  observer: { emoji: '\uD83D\uDD0D', label: 'Observer', fallbackColor: '#6B7280' },
  referee: { emoji: '\u2696\uFE0F', label: 'Referee', fallbackColor: '#F43F5E' }
};

const TOKEN_COLORS = {
  green: '#22C55E', brown: '#A16207', darkred: '#DC2626',
  orange: '#EA580C', blue: '#3B82F6', red: '#EF4444',
  yellow: '#EAB308', purple: '#A855F7', pink: '#EC4899',
  white: '#F1F5F9', black: '#374151', gray: '#6B7280', grey: '#6B7280'
};

function tokenColor(name) {
  return TOKEN_COLORS[name?.toLowerCase()] || '#94A3B8';
}

function personalityOf(id) { return PERSONALITY[id] || PERSONALITY.casual; }

const DICE_FACES = ['\u2680','\u2681','\u2682','\u2683','\u2684','\u2685'];
function diceEmoji(val) { return DICE_FACES[(val || 1) - 1] || '\uD83C\uDFB2'; }

function ordSuffix(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return 'th';
  switch (n % 10) {
    case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th';
  }
}

function locationEmoji(name, special) {
  const l = (name || '').toLowerCase();
  if (l.includes('store') || l.includes('shop') || l.includes('market')) return '🏪';
  if (l.includes('reef') || l.includes('beach') || l.includes('sea')) return '🐠';
  if (l.includes('closet') || l.includes('messy')) return '🗄️';
  if (l.includes('salon') || l.includes('barber')) return '💇';
  if (l.includes('cabin') || l.includes('house') || l.includes('home')) return '🏠';
  if (l.includes('hq') || l.includes('headquarters') || l.includes('office')) return '🏢';
  if (l.includes('wagon') || l.includes('car') || l.includes('subaru')) return '🚗';
  if (l.includes('park') || l.includes('garden')) return '🌳';
  if (l.includes('mine') || l.includes('cave')) return '⛏️';
  if (l.includes('saloon') || l.includes('bar')) return '🍺';
  if (l.includes('bank')) return '🏦';
  if (l.includes('jail') || l.includes('prison')) return '🔒';
  if (l.includes('station') || l.includes('train')) return '🚂';
  if (l.includes('forest') || l.includes('wood')) return '🌲';
  if (l.includes('castle') || l.includes('tower')) return '🏰';
  if (l.includes('temple') || l.includes('shrine')) return '⛩️';
  if (l.includes('camp') || l.includes('tent')) return '⛺';
  if (special === 'random_draw') return '🎲';
  if (special === 'peek') return '👁️';
  if (special === 'swap') return '🔄';
  return '📍';
}

function parseHSL(str) {
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  return { h: parts[0], s: parts[1], l: parts[2] };
}

/* ═══════════════════════════════════════════════

   ═══════════════════════════════════════════════ */
const THEME_MAP = {

/* ═══════════════════════════════════════════════
   THEME ENGINE
   ═══════════════════════════════════════════════ */
const ThemeEngine = {
  applied: false,

  applyTheme(game) {
    if (this.applied) return;
    const artStyle = game?.meta?.art_style;
    const theme = THEME_MAP[artStyle] || THEME_MAP.default;
    const root = document.documentElement;

    const p = parseHSL(theme.primary);
    const a = parseHSL(theme.accent);
    const s = parseHSL(theme.surface);
    const t = parseHSL(theme.text);

    // Primary family
    root.style.setProperty('--c-primary', `hsl(${p.h}, ${p.s}%, ${p.l}%)`);
    root.style.setProperty('--c-primary-light', `hsl(${p.h}, ${Math.max(0, p.s - 10)}%, ${Math.min(100, p.l + 15)}%)`);
    root.style.setProperty('--c-primary-dim', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 15)}%)`);

    // Accent
    root.style.setProperty('--c-accent', `hsl(${a.h}, ${a.s}%, ${a.l}%)`);

    // Surface family
    root.style.setProperty('--c-bg', `hsl(${s.h}, ${s.s}%, ${Math.max(0, s.l - 4)}%)`);
    root.style.setProperty('--c-bg-surface', `hsl(${s.h}, ${s.s}%, ${s.l}%)`);
    root.style.setProperty('--c-bg-card', `hsl(${s.h}, ${s.s}%, ${s.l + 5}%)`);

    // Text family
    root.style.setProperty('--c-text', `hsl(${t.h}, ${t.s}%, ${t.l}%)`);
    root.style.setProperty('--c-text-muted', `hsl(${t.h}, ${Math.max(0, t.s - 5)}%, ${Math.max(0, t.l - 30)}%)`);
    root.style.setProperty('--c-text-dim', `hsl(${t.h}, ${Math.max(0, t.s - 10)}%, ${Math.max(0, t.l - 45)}%)`);

    // Borders
    root.style.setProperty('--c-border', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 20)}%)`);
    root.style.setProperty('--c-border-subtle', `hsl(${s.h}, ${s.s}%, ${s.l + 8}%)`);

    // Derived shades
    root.style.setProperty('--primary-dim', `hsl(${p.h}, ${p.s}%, ${Math.max(0, p.l - 20)}%)`);
    root.style.setProperty('--primary-glow', `hsla(${p.h}, ${p.s}%, ${p.l}%, 0.3)`);
    root.style.setProperty('--surface-2', `hsl(${s.h}, ${s.s}%, ${s.l + 5}%)`);

    // Fonts
    root.style.setProperty('--font-heading', theme.fontFamily);
    root.style.setProperty('--font-body', theme.fontAccent);

    // Mood attribute
    document.body.setAttribute('data-mood', theme.mood);

    // Background gradient uses theme colors
    document.body.style.backgroundImage =
      `radial-gradient(ellipse at 15% 5%, hsla(${p.h}, ${p.s}%, ${p.l}%, 0.12) 0%, transparent 50%),` +
      `radial-gradient(ellipse at 85% 95%, hsla(${a.h}, ${a.s}%, ${a.l}%, 0.06) 0%, transparent 50%)`;

    // Inject fonts
    this.injectFonts(theme);

    this.applied = true;
  },

  injectFonts(theme) {
    const prev = document.getElementById('theme-fonts');
    if (prev) prev.remove();

    const families = new Set();
    [theme.fontFamily, theme.fontAccent].forEach(f => {
      const match = f.match(/['"]([^'"]+)['"]/);
      if (match && match[1]) families.add(match[1]);
    });

    // Filter out already-loaded fonts
    const loaded = new Set(['Fredoka', 'Nunito', 'Inter']);
    const toLoad = [...families].filter(f => !loaded.has(f));
    if (!toLoad.length) return;

    const url = 'https://fonts.googleapis.com/css2?' +
      toLoad.map(f => `family=${encodeURIComponent(f)}:wght@300;400;500;600;700`).join('&') +
      '&display=swap';

    const link = document.createElement('link');
    link.id = 'theme-fonts';
    link.rel = 'stylesheet';
    link.href = url;
    document.head.appendChild(link);
  }
};

/* ═══════════════════════════════════════════════
   ACTION TYPE RENDERERS
   ═══════════════════════════════════════════════ */
const ACTION_RENDER = {
  select_location: (a) => ({
    icon: '→',
    label: a.target_name || '',
    extraClass: ''
  }),
  play_card: (a) => ({
    icon: '🃏',
    label: `Played: ${a.card_name || a.target_name || 'card'}`,
    extraClass: ''
  }),
  trade: (a) => ({

    label: `${a.player_name} offered ${a.offer || '?'} to ${a.trade_target_name || '?'} for ${a.wants || '?'}`,
    extraClass: ''
  }),
  bid: (a) => ({
    icon: '🔨',
    label: `Bid: ${a.amount ?? a.value ?? '?'}`,
    extraClass: ''
  }),
  roll_dice: (a) => ({

    label: `Rolled: ${a.value ?? '?'}`,
    extraClass: 'dice'
  }),
  move: (a) => ({
    icon: '🚶',
    label: `${a.from_name || '?'} → ${a.target_name || '?'}`,

  }),
  activate_ability: (a) => ({
    icon: '✨',
    label: `Used: ${a.ability_name || a.target_name || '?'}`,
    extraClass: 'sparkle'
  }),
  collect: (a) => ({
    icon: '📦',
    label: `Collected: ${a.token_type || a.target_name || '?'}`,
    extraClass: ''
  }),
  convert: (a) => ({
    icon: '🔄',
    label: `${a.from_amount || '?'} ${a.from_type || '?'} → ${a.to_amount || '?'} ${a.to_type || '?'}`,
    extraClass: ''
  }),
  investigate: (a) => ({
    icon: '🔍',
    label: `Investigated: ${a.target_name || '?'}${a.found ? ' — found ' + a.found : ''}`,
    extraClass: ''
  }),
  push_luck: (a) => ({
    icon: '🎰',
    label: a.stopped
      ? `Stopped — banked ${a.banked ?? '?'} tokens`
      : `Pushed again... (${a.push_count || '?'}${ordSuffix(a.push_count || 1)} push)`,
    extraClass: ''
  })
};

function getActionRender(action) {
  const renderer = ACTION_RENDER[action.action_type];
  if (renderer) return renderer(action);
  // Fallback: generic render
  return {
    icon: '→',
    label: action.target_name || action.action_type || '',
    extraClass: ''
  };
}

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const State = {
  view: 'loading',
  report: null,
  games: [],
  currentGameIndex: -1,
  currentRound: 0,
  isPlaying: false,
  playInterval: null,
  initialBagCount: {},

  get game() { return this.games[this.currentGameIndex] || null; },
  get round() { return this.game?.rounds?.[this.currentRound] || null; },
  get prevRound() { return this.currentRound > 0 ? this.game.rounds[this.currentRound - 1] : null; },
  get totalRounds() { return this.game?.rounds?.length || 0; },
  get isFirst() { return this.currentRound === 0; },
  get isLast() { return this.currentRound >= this.totalRounds - 1; },
};

/* ═══════════════════════════════════════════════
   DATA LOADER
   ═══════════════════════════════════════════════ */
const DataLoader = {
  async loadReport(order) {
    try {
      const r = await fetch(`${order}/games/report.json`);
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  },

  async loadGame(order, filename) {
    try {
      const r = await fetch(`${order}/games/${filename}`);
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  },

  async loadAllFromReport(order, report) {
    const promises = report.results.map(r => {
      const fn = `game-${String(r.game).padStart(2, '0')}-${r.players}p.json`;
      return this.loadGame(order, fn);
    });
    const results = await Promise.all(promises);
    return results.filter(Boolean);
  },

  async discover(order) {
    const patterns = [
      'game-01-2p', 'game-02-2p', 'game-03-4p',
      'game-04-4p', 'game-05-6p', 'game-06-8p',
      'game-01-4p', 'game-02-4p', 'game-03-6p',
      'game-04-6p', 'game-05-8p', 'game-06-4p'
    ];
    const games = [];
    for (const p of patterns) {
      const g = await this.loadGame(order, p + '.json');
      if (g) games.push(g);
    }
    return games;
  },

  startPolling(order, onData) {
    if (State.pollInterval) clearInterval(State.pollInterval);
    State.pollInterval = setInterval(async () => {
      const report = await this.loadReport(order);
      if (report) onData(report);
    }, 15000);
  },

  stopPolling() {
    if (State.pollInterval) { clearInterval(State.pollInterval); State.pollInterval = null; }
  }
};

/* ═══════════════════════════════════════════════
   BOARD LAYOUT & RENDERER
   ═══════════════════════════════════════════════ */
const Board = {
  layout: null,
  layoutType: 'freeform',
  W: 860,
  H: 520,
  playerEls: {},
  tokenGroups: {},

  generateLayout(game) {
    const locs = game.board.locations;
    const type = game.board?.layout_type || 'freeform';
    const pos = {};

    if (type === 'linear') {
      const padding = 70;
      const trackY = this.H / 2;
      const n = locs.length;
      const spacing = n > 1 ? (this.W - 2 * padding) / (n - 1) : 0;
      locs.forEach((loc, i) => {
        pos[loc.id] = {
          x: n > 1 ? padding + i * spacing : this.W / 2,
          y: trackY,
          name: loc.name, special: loc.special,
          emoji: locationEmoji(loc.name, loc.special)
        };
      });
    } else if (type === 'grid') {
      const cols = game.board?.grid_columns || 4;
      const rows = Math.ceil(locs.length / cols);
      const padX = 60, padY = 50;
      const cellW = (this.W - 2 * padX) / cols;
      const cellH = (this.H - 2 * padY) / Math.max(rows, 1);
      locs.forEach((loc, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        pos[loc.id] = {
          x: padX + col * cellW + cellW / 2,
          y: padY + row * cellH + cellH / 2,
          name: loc.name, special: loc.special,
          emoji: locationEmoji(loc.name, loc.special),
          gridCol: col, gridRow: row
        };
      });
    } else {
      // Freeform: use x/y coords if present, else circle
      const hasCoords = locs.length > 0 && locs.every(l => l.x != null && l.y != null);
      if (hasCoords) {
        const xs = locs.map(l => l.x), ys = locs.map(l => l.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
        const pad = 80;
        locs.forEach(loc => {
          pos[loc.id] = {
            x: pad + ((loc.x - minX) / rangeX) * (this.W - 2 * pad),
            y: pad + ((loc.y - minY) / rangeY) * (this.H - 2 * pad),
            name: loc.name, special: loc.special,
            emoji: locationEmoji(loc.name, loc.special)
          };
        });
      } else {
        const cx = this.W / 2, cy = this.H / 2;
        const n = locs.length;
        const radius = Math.min(this.W, this.H) * 0.35;
        locs.forEach((loc, i) => {
          const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
          const r = loc.special ? radius * 0.9 : radius;
          pos[loc.id] = {
            x: cx + r * Math.cos(angle),
            y: cy + r * Math.sin(angle),
            name: loc.name, special: loc.special,
            emoji: locationEmoji(loc.name, loc.special)
          };
        });
      }
    }
    return pos;
  },

  renderConnections(game) {
    const svg = $('#board-svg');
    const type = this.layoutType;
    const connG = svgEl('g', { class: 'connections', opacity: '0.35' });

    if (type === 'linear') {
      // Track line
      const locs = game.board.locations;
      if (locs.length > 1) {
        const first = this.layout[locs[0].id];
        const last = this.layout[locs[locs.length - 1].id];
        connG.appendChild(svgEl('line', {
          x1: first.x, y1: first.y, x2: last.x, y2: last.y,
          stroke: '#4C1D95', 'stroke-width': '3', 'stroke-linecap': 'round'
        }));
        // Directional arrows between nodes
        for (let i = 0; i < locs.length - 1; i++) {
          const a = this.layout[locs[i].id], b = this.layout[locs[i + 1].id];
          if (!a || !b) continue;
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
          const dx = b.x - a.x, dy = b.y - a.y;
          const len = Math.hypot(dx, dy) || 1;
          const ux = dx / len, uy = dy / len;
          const px = -uy, py = ux; // perpendicular
          connG.appendChild(svgEl('polygon', {
            points: `${mx + ux * 6},${my + uy * 6} ${mx - ux * 4 + px * 5},${my - uy * 4 + py * 5} ${mx - ux * 4 - px * 5},${my - uy * 4 - py * 5}`,
            fill: '#6D28D9', opacity: '0.7'
          }));
        }
      }
    } else if (type === 'grid') {
      const locs = game.board.locations;
      const cols = game.board?.grid_columns || 4;
      if (game.board.connections?.length) {
        // Explicit connections
        game.board.connections.forEach(c => {
          const a = this.layout[c.from], b = this.layout[c.to];
          if (!a || !b) return;
          connG.appendChild(svgEl('line', {
            x1: a.x, y1: a.y, x2: b.x, y2: b.y,
            stroke: '#4C1D95', 'stroke-width': '1.5'
          }));
        });
      } else {
        // Auto-generate adjacency
        locs.forEach((loc, i) => {
          const col = i % cols, row = Math.floor(i / cols);
          // Right neighbor
          if (col < cols - 1 && i + 1 < locs.length) {
            const a = this.layout[loc.id], b = this.layout[locs[i + 1].id];
            if (a && b) connG.appendChild(svgEl('line', {
              x1: a.x, y1: a.y, x2: b.x, y2: b.y,
              stroke: '#4C1D95', 'stroke-width': '1.5'
            }));
          }
          // Bottom neighbor
          if (i + cols < locs.length) {
            const a = this.layout[loc.id], b = this.layout[locs[i + cols].id];
            if (a && b) connG.appendChild(svgEl('line', {
              x1: a.x, y1: a.y, x2: b.x, y2: b.y,
              stroke: '#4C1D95', 'stroke-width': '1.5'
            }));
          }
        });
      }
    } else {
      // Freeform: curved paths
      if (game.board.connections?.length) {
        game.board.connections.forEach(c => {
          const a = this.layout[c.from], b = this.layout[c.to];
          if (!a || !b) return;
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
          const dx = b.x - a.x, dy = b.y - a.y;
          const len = Math.hypot(dx, dy) || 1;
          const off = 25;
          const cpx = mx - (dy / len) * off, cpy = my + (dx / len) * off;
          connG.appendChild(svgEl('path', {
            d: `M${a.x},${a.y} Q${cpx},${cpy} ${b.x},${b.y}`,
            stroke: '#4C1D95', 'stroke-width': '2', fill: 'none',
            'stroke-dasharray': '6 4'
          }));
        });
      }
    }
    svg.appendChild(connG);
  },

  render(game, roundIdx) {
    this.layoutType = game.board?.layout_type || 'freeform';
    const replayLayout = $('#replay-layout');

    // Handle "none" layout — hide board, expand commentary
    if (this.layoutType === 'none') {
      replayLayout.classList.add('replay-layout--no-board');
      this.layout = {};
      this.playerEls = {};
      this.tokenGroups = {};
      return;
    }
    replayLayout.classList.remove('replay-layout--no-board');

    const svg = $('#board-svg');
    svg.innerHTML = '';
    svg.setAttribute('viewBox', `0 0 ${this.W} ${this.H}`);

    this.layout = this.generateLayout(game);
    this.playerEls = {};
    this.tokenGroups = {};

    // Connections
    this.renderConnections(game);

    // Location cards — size adapts to layout type
    const isGrid = this.layoutType === 'grid';
    const cols = game.board?.grid_columns || 4;
    const rows = Math.ceil((game.board.locations?.length || 1) / cols);
    const cw = isGrid ? Math.min(100, (this.W - 120) / cols * 0.82) : 116;
    const ch = isGrid ? Math.min(60, (this.H - 100) / rows * 0.78) : 68;

    for (const [id, p] of Object.entries(this.layout)) {
      const g = svgEl('g', { class: 'loc-card', 'data-loc': id, transform: `translate(${p.x - cw / 2}, ${p.y - ch / 2})` });

      const rect = svgEl('rect', {
        width: cw, height: ch, rx: '10', ry: '10',
        fill: '#16213E',
        stroke: p.special ? '#F59E0B' : '#4C1D95',
        'stroke-width': p.special ? '2' : '1.5'
      });
      g.appendChild(rect);

      if (p.special) {
        g.appendChild(svgEl('rect', {
          width: cw, height: ch, rx: '10', ry: '10',
          fill: 'none', stroke: 'rgba(245,158,11,0.2)', 'stroke-width': '6',
          filter: 'blur(4px)'
        }));
      }

      const em = svgEl('text', {
        x: cw / 2, y: ch * 0.35, 'text-anchor': 'middle', 'font-size': isGrid ? '14' : '18'
      });
      em.textContent = p.emoji;
      g.appendChild(em);

      const maxLen = isGrid ? 10 : 15;
      const nm = svgEl('text', {
        x: cw / 2, y: ch * 0.65, 'text-anchor': 'middle',
        fill: '#E2E8F0', 'font-size': isGrid ? '9' : '10.5',
        'font-family': 'Nunito, sans-serif', 'font-weight': '600'
      });
      nm.textContent = p.name.length > maxLen ? p.name.slice(0, maxLen - 2) + '..' : p.name;
      g.appendChild(nm);

      const tg = svgEl('g', { class: 'loc-tokens', transform: `translate(${cw / 2}, ${ch - 10})` });
      g.appendChild(tg);
      this.tokenGroups[id] = tg;

      svg.appendChild(g);
    }

    // Player tokens layer
    const ptLayer = svgEl('g', { class: 'player-tokens-layer' });
    svg.appendChild(ptLayer);

    game.meta.players.forEach(p => {
      const g = svgEl('g', { class: 'player-token', 'data-player': p.id });
      g.appendChild(svgEl('circle', {
        cx: '0', cy: '0', r: '11',
        fill: p.color, stroke: '#fff', 'stroke-width': '2'
      }));
      const txt = svgEl('text', {
        x: '0', y: '4', 'text-anchor': 'middle',
        fill: '#fff', 'font-size': '10', 'font-weight': '700',
        'font-family': 'Nunito, sans-serif'
      });
      txt.textContent = p.name[0];
      g.appendChild(txt);
      ptLayer.appendChild(g);
      this.playerEls[p.id] = g;
    });

    this.updateRound(game, roundIdx, false);
  },

  updateRound(game, roundIdx, animate) {
    if (this.layoutType === 'none') return;
    const round = game.rounds[roundIdx];
    if (!round) return;

    // Determine player positions: prefer state_after.players[].location, fallback to action targets
    const playerLocs = {};
    const stateAfter = round.state_after;

    if (stateAfter?.players) {
      stateAfter.players.forEach(ps => {
        if (ps.location && this.layout[ps.location]) {
          if (!playerLocs[ps.location]) playerLocs[ps.location] = [];
          playerLocs[ps.location].push(ps.id);
        }
      });
    }

    // Fallback: group by action target
    if (Object.keys(playerLocs).length === 0) {
      round.actions.forEach(a => {
        const target = a.target || a.target_id;
        if (target && this.layout[target]) {
          if (!playerLocs[target]) playerLocs[target] = [];
          playerLocs[target].push(a.player_id);
        }
      });
    }

    // Position players at their locations
    for (const [locId, pids] of Object.entries(playerLocs)) {
      const loc = this.layout[locId];
      if (!loc) continue;
      const n = pids.length;
      const spacing = Math.min(24, 80 / n);
      const totalW = (n - 1) * spacing;
      const startX = loc.x - totalW / 2;
      const markerY = loc.y - 48;

      pids.forEach((pid, i) => {
        const el = this.playerEls[pid];
        if (!el) return;
        const tx = startX + i * spacing;
        if (animate) {
          gsap.to(el, { x: tx, y: markerY, duration: 0.7, ease: 'back.out(1.3)' });
        } else {
          gsap.set(el, { x: tx, y: markerY });
        }
      });
    }

    // Animate move actions: draw temporary path line
    if (animate) {
      round.actions.forEach(a => {
        if (a.action_type === 'move' && a.from) {
          const fromLoc = this.layout[a.from];
          const toLoc = this.layout[a.target || a.target_id];
          if (fromLoc && toLoc) {
            const svg = $('#board-svg');
            const trail = svgEl('line', {
              x1: fromLoc.x, y1: fromLoc.y - 48,
              x2: toLoc.x, y2: toLoc.y - 48,
              stroke: game.meta.players.find(p => p.id === a.player_id)?.color || '#fff',
              'stroke-width': '2', opacity: '0.6', 'stroke-dasharray': '4 3'
            });
            svg.appendChild(trail);
            gsap.to(trail, { opacity: 0, duration: 1.5, delay: 0.5, onComplete: () => trail.remove() });
          }
        }
      });
    }

    // Update location tokens
    if (stateAfter?.locations) {
      stateAfter.locations.forEach(loc => {
        const tg = this.tokenGroups[loc.id];
        if (!tg) return;
        tg.innerHTML = '';
        const tokens = loc.tokens || [];
        const max = Math.min(tokens.length, 8);
        const dotR = 4, spc = 10;
        const startX = -(max - 1) * spc / 2;
        tokens.slice(0, max).forEach((t, i) => {
          const dot = svgEl('circle', {
            cx: startX + i * spc, cy: '0', r: dotR,
            fill: tokenColor(t), opacity: '0.9'
          });
          if (animate) {
            gsap.from(dot, { scale: 0, transformOrigin: 'center', duration: 0.3, delay: 0.05 * i, ease: 'back.out(2)' });
          }
          tg.appendChild(dot);
        });
        if (tokens.length > max) {
          const more = svgEl('text', {
            x: startX + max * spc + 4, y: '4',
            fill: '#94A3B8', 'font-size': '9', 'font-family': 'Nunito, sans-serif'
          });
          more.textContent = `+${tokens.length - max}`;
          tg.appendChild(more);
        }
      });
    }

    // Collision highlights
    $$('.loc-card', $('#board-svg')).forEach(el => el.classList.remove('collision'));
    if (round.resolution?.collisions?.length) {
      round.resolution.collisions.forEach(c => {
        const locEl = $(`.loc-card[data-loc="${c.location}"]`, $('#board-svg'));
        if (locEl) {
          locEl.classList.add('collision');
          if (animate) {
            gsap.fromTo(locEl.querySelector('rect'),
              { filter: 'drop-shadow(0 0 0px rgba(234,179,8,0))' },
              { filter: 'drop-shadow(0 0 12px rgba(234,179,8,0.6))', duration: 0.4, yoyo: true, repeat: 1 }
            );
          }
        }
      });
    }
  }
};

/* ═══════════════════════════════════════════════
   COMMENTARY
   ═══════════════════════════════════════════════ */
const Commentary = {
  feed: null,
  maxBubbles: 30,
  autoScroll: true,
  _typewriteTweens: [],

  init() {
    this.feed = $('#commentary-feed');
    this.feed.addEventListener('scroll', () => {
      const el = this.feed;
      this.autoScroll = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    });
  },

  clear() {
    this.feed.innerHTML = '';
    this._typewriteTweens.forEach(t => t.kill());
    this._typewriteTweens = [];
  },

  renderRound(round, players, animate) {
    this.clear();

    // Collisions
    if (round.resolution?.collisions?.length) {
      round.resolution.collisions.forEach(c => {
        const pNames = c.players.map(pid => {
          const p = players.find(x => x.id === pid);
          return p ? p.name : pid;
        }).join(', ');
        this.addSystemMsg(`💥 Collision at ${c.location_name}! ${pNames} (${c.player_count} players)`, 'collision');
        if (c.resolution_rule) {
          this.addSystemMsg(c.resolution_rule, 'info');
        }
      });
    }

    // Player actions (protocol-aware)
    round.actions.forEach((action, i) => {
      const player = players.find(p => p.id === action.player_id);
      this.addBubble(action, player, animate, i * 0.15);
    });

    // Resolution outcomes (mini-feed)
    if (round.resolution?.outcomes?.length) {
      this.renderOutcomes(round.resolution.outcomes, players);
    }

    // Referee flags as warning banners
    if (round.referee_flags?.length) {
      round.referee_flags.forEach(f => {
        const text = typeof f === 'string' ? f : (f.message || f.description || JSON.stringify(f));
        this.addSystemMsg(`⚠️ Rule Gap: ${text}`, 'warning');
      });
    }

    // Observer notes
    if (round.observer_notes?.length) {
      round.observer_notes.forEach(n => {
        this.addSystemMsg(`Observer: ${typeof n === 'string' ? n : JSON.stringify(n)}`, 'info');
      });
    }
  },

  addBubble(action, player, animate, delay) {
    const pers = personalityOf(player?.personality);
    const color = player?.color || pers.fallbackColor;
    const ar = getActionRender(action);

    const div = document.createElement('div');
    div.className = 'bubble';
    if (ar.extraClass === 'sparkle') div.classList.add('bubble--sparkle');
    div.style.setProperty('--bubble-color', color);
    if (animate) div.style.animationDelay = `${delay}s`;

    // Header with action-type awareness
    const header = document.createElement('div');
    header.className = 'bubble__header';

    let targetHTML;
    if (action.action_type === 'roll_dice') {
      targetHTML = `<span class="bubble__dice">${ar.icon}</span> <span class="bubble__target">${ar.label}</span>`;
    } else if (action.action_type === 'trade') {
      targetHTML = `<span class="bubble__action-badge">↔ Trade</span> <span class="bubble__target">${ar.label}</span>`;
    } else if (action.action_type && action.action_type !== 'select_location') {
      targetHTML = `<span class="bubble__action-badge">${ar.icon} ${action.action_type.replace(/_/g, ' ')}</span> <span class="bubble__target">${ar.label}</span>`;
    } else {
      targetHTML = `<span class="bubble__target">${ar.icon} ${ar.label}</span>`;
    }

    header.innerHTML = `
      <span class="bubble__emoji">${pers.emoji}</span>
      <span class="bubble__name" style="color:${color}">${action.player_name || 'Agent'}</span>
      ${targetHTML}
    `;
    div.appendChild(header);

    const thought = document.createElement('div');
    thought.className = 'bubble__thought';
    div.appendChild(thought);

    // Tokens collected
    if (action.tokens_collected?.length) {
      const tokensDiv = document.createElement('div');
      tokensDiv.className = 'bubble__tokens';
      action.tokens_collected.forEach(t => {
        const dot = document.createElement('span');
        dot.className = 'bubble__token-dot';
        dot.style.background = tokenColor(t);
        tokensDiv.appendChild(dot);
      });
      div.appendChild(tokensDiv);
    }

    // Case completed
    if (action.case_completed) {
      const caseDiv = document.createElement('div');
      caseDiv.className = 'bubble__case';
      caseDiv.textContent = `Case Solved: ${action.case_completed.name || action.case_completed.id}`;
      div.appendChild(caseDiv);
    }

    this.feed.appendChild(div);
    this._trimBubbles();

    // Check if this action was involved in a collision
    if (action._collision) {
      div.classList.add('bubble--collision-flash');
    }

    if (animate && action.thought) {
      const tw = gsap.to(thought, {
        duration: Math.min(action.thought.length * 0.025, 2.5),
        text: { value: action.thought, delimiter: '' },
        ease: 'none',
        delay: delay + 0.1,
        onUpdate: () => { if (this.autoScroll) this.feed.scrollTop = this.feed.scrollHeight; }
      });
      this._typewriteTweens.push(tw);
    } else {
      thought.textContent = action.thought || '';
    }

    if (this.autoScroll) this.feed.scrollTop = this.feed.scrollHeight;
  },

  renderOutcomes(outcomes, players) {
    const outDiv = document.createElement('div');
    outDiv.className = 'outcome-feed';

    const title = document.createElement('div');
    title.className = 'outcome-feed__title';
    title.textContent = 'Round Outcomes';
    outDiv.appendChild(title);

    outcomes.forEach(outcome => {
      const line = document.createElement('div');
      line.className = 'outcome-line';
      const player = players.find(p => p.id === outcome.player_id);
      const dotHTML = player ? `<span class="outcome-dot" style="background:${player.color}"></span>` : '';
      line.innerHTML = `${dotHTML}<span>${outcome.description || outcome.text || JSON.stringify(outcome)}</span>`;
      outDiv.appendChild(line);
    });

    this.feed.appendChild(outDiv);
    if (this.autoScroll) this.feed.scrollTop = this.feed.scrollHeight;
  },

  addSystemMsg(text, type) {
    const div = document.createElement('div');
    div.className = `system-msg system-msg--${type}`;
    div.textContent = text;
    this.feed.appendChild(div);
    if (this.autoScroll) this.feed.scrollTop = this.feed.scrollHeight;
  },

  showTyping() {
    this.removeTyping();
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span><span class="typing-label">Transmission incoming...</span>';
    this.feed.appendChild(div);
    if (this.autoScroll) this.feed.scrollTop = this.feed.scrollHeight;
  },

  removeTyping() {
    const el = $('#typing');
    if (el) el.remove();
  },

  _trimBubbles() {
    const bubbles = $$('.bubble, .system-msg, .outcome-feed', this.feed);
    while (bubbles.length > this.maxBubbles) {
      bubbles.shift().remove();
    }
  }
};

/* ═══════════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════════ */
const Timeline = {
  render(game) {
    const el = $('#timeline');
    const total = game.rounds.length;

    const roundMeta = game.rounds.map(r => ({
      hasCollision: r.resolution?.collisions?.length > 0,
      hasFlag: r.referee_flags?.length > 0
    }));

    let html = `<div class="timeline__controls">`;
    html += `<button class="timeline__btn" id="btn-prev" title="Previous round">◀</button>`;
    html += `<button class="timeline__btn timeline__btn--play" id="btn-play" title="Auto-play">▶</button>`;
    html += `<button class="timeline__btn" id="btn-next" title="Next round">▶</button>`;
    html += `</div>`;
    html += `<div class="timeline__rounds" id="timeline-rounds">`;
    for (let i = 0; i < total; i++) {
      let cls = 'timeline__round';
      if (i === State.currentRound) cls += ' timeline__round--active';
      if (roundMeta[i].hasCollision) cls += ' timeline__round--collision';
      if (roundMeta[i].hasFlag) cls += ' timeline__round--flagged';
      html += `<button class="${cls}" data-round="${i}">${i + 1}</button>`;
    }
    html += `</div>`;
    html += `<div class="timeline__info" id="timeline-info">Round ${State.currentRound + 1}/${total}</div>`;
    el.innerHTML = html;

    $('#btn-prev').onclick = () => { if (!State.isFirst) Viewer.goToRound(State.currentRound - 1); };
    $('#btn-next').onclick = () => { if (!State.isLast) Viewer.goToRound(State.currentRound + 1); };
    $('#btn-play').onclick = () => Viewer.toggleAutoplay();
    $$('.timeline__round', el).forEach(btn => {
      btn.onclick = () => Viewer.goToRound(+btn.dataset.round);
    });
  },

  updateActive(roundIdx) {
    $$('.timeline__round').forEach((btn, i) => {
      btn.classList.toggle('timeline__round--active', i === roundIdx);
    });
    const info = $('#timeline-info');
    if (info) info.textContent = `Round ${roundIdx + 1}/${State.totalRounds}`;

    const active = $('.timeline__round--active');
    if (active) active.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });

    const prev = $('#btn-prev');
    const next = $('#btn-next');
    if (prev) prev.disabled = roundIdx === 0;
    if (next) next.disabled = roundIdx >= State.totalRounds - 1;
  },

  updatePlayState(playing) {
    const btn = $('#btn-play');
    if (!btn) return;
    btn.textContent = playing ? '⏸' : '▶';
    btn.classList.toggle('playing', playing);
    btn.title = playing ? 'Pause' : 'Auto-play';
  }
};

/* ═══════════════════════════════════════════════
   SCOREBOARD
   ═══════════════════════════════════════════════ */
const Scoreboard = {
  render(game, roundIdx) {
    const el = $('#scoreboard');
    const round = game.rounds[roundIdx];
    if (!round) { el.innerHTML = ''; return; }

    const winTarget = game.meta.win_target || 3;
    const stateAfter = round.state_after;
    const playerStates = stateAfter?.players || [];

    // Find leader by score (use generic score field, fallback to cases_completed)
    let maxScore = -1, leaderId = null;
    playerStates.forEach(ps => {
      const score = ps.score ?? ps.cases_completed ?? 0;
      if (score > maxScore) { maxScore = score; leaderId = ps.id; }
    });

    let html = '';
    game.meta.players.forEach(p => {
      const ps = playerStates.find(x => x.id === p.id);
      if (!ps) return;
      const pers = personalityOf(p.personality);
      const score = ps.score ?? ps.cases_completed ?? 0;
      const pct = Math.min(100, (score / winTarget) * 100);
      const isLeader = p.id === leaderId && maxScore > 0;

      html += `<div class="player-card${isLeader ? ' player-card--leader' : ''}" data-player="${p.id}">`;
      html += `<div class="player-card__header">`;
      html += `<div class="player-card__avatar" style="background:${p.color}">${p.name[0]}</div>`;
      html += `<span class="player-card__name">${pers.emoji} ${p.name}</span>`;
      html += `</div>`;
      html += `<div class="player-card__character">${ps.character || p.character || ''}</div>`;
      html += `<div class="player-card__progress">`;
      html += `<div class="player-card__bar"><div class="player-card__bar-fill" style="width:${pct}%;background:${p.color}"></div></div>`;
      html += `<span class="player-card__score" data-score="${p.id}">${score}/${winTarget}</span>`;
      html += `</div>`;
      if (ps.tokens?.length) {
        html += `<div class="player-card__tokens">`;
        ps.tokens.slice(0, 12).forEach(t => {
          html += `<span class="player-card__token" style="background:${tokenColor(t)}"></span>`;
        });
        if (ps.tokens.length > 12) html += `<span style="font-size:0.65rem;color:#94A3B8">+${ps.tokens.length - 12}</span>`;
        html += `</div>`;
      }
      if (ps.has_sheriff) html += `<div class="player-card__badge">🤠 Sheriff</div>`;
      html += `</div>`;
    });

    // Supply tracker (show if bag_count or supply exists)
    const bagCount = stateAfter?.bag_count ?? stateAfter?.supply_count;
    if (bagCount != null) {
      const initBag = State.initialBagCount[State.currentGameIndex] || bagCount;
      const bagPct = typeof bagCount === 'number' ? Math.max(0, (bagCount / initBag) * 100) : 50;
      const supplyLabel = stateAfter?.supply_label || 'Supply Bag';
      html += `<div class="supply-tracker">`;
      html += `<div class="supply-tracker__label">${supplyLabel}</div>`;
      html += `<div class="supply-tracker__value">${bagCount}</div>`;
      html += `<div class="supply-tracker__bar"><div class="supply-tracker__bar-fill" style="width:${bagPct}%"></div></div>`;
      html += `</div>`;
    }

    el.innerHTML = html;
  },

  animateScoreChange(game, fromRound, toRound) {
    if (!fromRound || !toRound) return;
    const fromPlayers = fromRound.state_after?.players || [];
    const toPlayers = toRound.state_after?.players || [];
    const winTarget = game.meta.win_target || 3;

    toPlayers.forEach(tp => {
      const fp = fromPlayers.find(x => x.id === tp.id);
      const fromScore = fp?.score ?? fp?.cases_completed ?? 0;
      const toScore = tp.score ?? tp.cases_completed ?? 0;
      if (fromScore !== toScore) {
        const el = $(`[data-score="${tp.id}"]`);
        if (el) {
          const obj = { val: fromScore };
          gsap.to(obj, {
            val: toScore, duration: 0.6, ease: 'power2.out',
            onUpdate: () => { el.textContent = `${Math.round(obj.val)}/${winTarget}`; }
          });
        }
      }
    });
  }
};

/* ═══════════════════════════════════════════════
   SUMMARY VIEW
   ═══════════════════════════════════════════════ */
const SummaryView = {
  render(report, games) {
    const verdict = (report?.verdict || 'PASS').toLowerCase();
    const icons = { pass: '✅', guardrail: '⚠️', fail: '❌' };
    const labels = { pass: 'All Clear', guardrail: 'Guardrail — Items need review', fail: 'Critical issues found' };

    const banner = $('#summary-banner');
    banner.className = `summary__banner summary__banner--${verdict}`;
    banner.innerHTML = `
      <span class="summary__banner-icon">${icons[verdict] || '❓'}</span>
      <span class="summary__banner-text">${labels[verdict] || report?.verdict || 'Unknown'}</span>
    `;

    const meta = $('#summary-meta');
    meta.innerHTML = `
      <span><strong>${report?.game_title || games[0]?.meta?.game_title || 'Game'}</strong></span>
      <span>${report?.games_played || games.length} games played</span>
      <span>Players: ${[...new Set(report?.player_counts || games.map(g => g.meta.player_count))].join(', ')}</span>
    `;

    const grid = $('#summary-grid');
    grid.innerHTML = '';

    games.forEach((game, idx) => {
      const r = report?.results?.[idx];
      const cardVerdict = (r?.flags > 0) ? 'fail' : (r?.collision_rate >= 0.8) ? 'guardrail' : 'pass';

      const card = document.createElement('div');
      card.className = `game-card game-card--${cardVerdict}`;
      card.innerHTML = `
        <div class="game-card__header">
          <span class="game-card__num">Game ${game.meta.game_number || idx + 1}</span>
          <span class="game-card__badge">${game.meta.player_count}P</span>
        </div>
        <div class="game-card__winner">
          <span>${personalityOf(r?.winner_personality || game.meta.players.find(p => p.id === game.meta.winner)?.personality)?.emoji || '🏆'}</span>
          <span class="game-card__winner-name">${r?.winner || game.meta.winner_name || '?'}</span>
        </div>
        <div class="game-card__stats">
          <span class="game-card__stat">🔄 ${r?.rounds || game.meta.total_rounds || '?'} rounds</span>
          <span class="game-card__stat">💥 ${r?.collision_rate != null ? Math.round(r.collision_rate * 100) + '%' : '?'} collisions</span>
          <span class="game-card__stat">🚩 ${r?.flags ?? 0} flags</span>
        </div>
      `;
      card.onclick = () => Viewer.enterReplay(idx);
      grid.appendChild(card);
    });
  }
};

/* ═══════════════════════════════════════════════
   ANIMATOR
   ═══════════════════════════════════════════════ */
const Animator = {
  _tl: null,

  kill() {
    if (this._tl) { this._tl.kill(); this._tl = null; }
    gsap.killTweensOf('.bubble, .system-msg, .player-token, .loc-card rect');
  },

  playRound(roundIdx, animate) {
    this.kill();
    const game = State.game;
    if (!game) return;

    const round = game.rounds[roundIdx];
    if (!round) return;

    if (!animate) {
      Board.updateRound(game, roundIdx, false);
      Commentary.renderRound(round, game.meta.players, false);
      Scoreboard.render(game, roundIdx);
      Timeline.updateActive(roundIdx);
      return;
    }

    const tl = gsap.timeline({
      onComplete: () => {
        if (roundIdx === game.rounds.length - 1 && game.meta.status === 'completed') {
          this._celebrateWin(game);
        }
        if (State.isPlaying && !State.isLast) {
          State.playInterval = setTimeout(() => {
            if (State.isPlaying) Viewer.goToRound(State.currentRound + 1);
          }, 1500);
        } else if (State.isPlaying && State.isLast) {
          Viewer.stopAutoplay();
        }
      }
    });
    this._tl = tl;

    tl.call(() => {
      Commentary.showTyping();
      Timeline.updateActive(roundIdx);
    });
    tl.to({}, { duration: 0.25 });

    tl.call(() => {
      Board.updateRound(game, roundIdx, true);
      Commentary.removeTyping();
    });
    tl.to({}, { duration: 0.8 });

    tl.call(() => {
      Commentary.renderRound(round, game.meta.players, true);
    });
    tl.to({}, { duration: Math.min(round.actions.length * 0.5 + 0.8, 3) });

    tl.call(() => {
      const prevRound = roundIdx > 0 ? game.rounds[roundIdx - 1] : null;
      Scoreboard.render(game, roundIdx);
      Scoreboard.animateScoreChange(game, prevRound, round);
    });
  },

  _celebrateWin(game) {
    const winner = game.meta.players.find(p => p.id === game.meta.winner);
    if (!winner) return;

    if (typeof confetti === 'function') {
      const color = winner.color || '#fcb700';
      confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: [color, '#fcb700', '#7C3AED', '#fff'] });
      setTimeout(() => {
        confetti({ particleCount: 60, spread: 50, origin: { y: 0.7, x: 0.3 }, colors: [color, '#fcb700'] });
      }, 300);
      setTimeout(() => {
        confetti({ particleCount: 60, spread: 50, origin: { y: 0.7, x: 0.7 }, colors: [color, '#7C3AED'] });
      }, 600);
    }

    const overlay = $('#winner-overlay');
    $('#winner-name').textContent = `${winner.name} Wins!`;
    $('#winner-condition').textContent = game.final_analysis?.win_condition_met || 'Victory!';
    $('#winner-details').innerHTML = `
      <span>🔄 ${game.meta.total_rounds} rounds</span>
      <span>${personalityOf(winner.personality).emoji} ${personalityOf(winner.personality).label}</span>
      <span style="color:${winner.color}">● ${winner.character}</span>
    `;
    overlay.classList.add('active');
    gsap.fromTo(overlay, { opacity: 0 }, { opacity: 1, duration: 0.4 });
    gsap.fromTo($('.winner-overlay__crown'), { scale: 0, rotation: -30 }, { scale: 1, rotation: 0, duration: 0.6, ease: 'back.out(2)', delay: 0.2 });
  }
};

/* ═══════════════════════════════════════════════
   VIEWER (Router + Init)
   ═══════════════════════════════════════════════ */
const Viewer = {
  showView(name) {
    State.view = name;
    $$('.view').forEach(v => v.classList.remove('active'));
    const el = $(`#${name}-view`);
    if (el) el.classList.add('active');

    const back = $('#btn-back');
    const gameTitle = $('#header-game-title');
    back.hidden = name !== 'replay';
    gameTitle.textContent = name === 'replay' && State.game
      ? State.game.meta.game_title + (State.game.meta.game_title_original ? ` (${State.game.meta.game_title_original})` : '')
      : State.report?.game_title || '';

    const verdict = State.report?.verdict?.toLowerCase();
    const vBadge = $('#header-verdict');
    if (verdict && name !== 'loading') {
      vBadge.hidden = false;
      vBadge.className = `header__verdict header__verdict--${verdict}`;
      vBadge.textContent = State.report.verdict;
    } else {
      vBadge.hidden = true;
    }
  },

  enterReplay(gameIdx) {
    Animator.kill();
    this.stopAutoplay();
    State.currentGameIndex = gameIdx;
    State.currentRound = 0;
    const game = State.game;
    if (!game) return;

    // Track initial bag count
    if (State.initialBagCount[gameIdx] === undefined) {
      const firstBag = game.rounds[0]?.state_after?.bag_count ?? game.rounds[0]?.state_after?.supply_count;
      State.initialBagCount[gameIdx] = firstBag ? firstBag + 6 : 40;
    }

    // Apply theme from first game (once)
    ThemeEngine.applyTheme(game);

    this.showView('replay');
    Board.render(game, 0);
    Commentary.renderRound(game.rounds[0], game.meta.players, false);
    Timeline.render(game);
    Scoreboard.render(game, 0);
  },

  goToRound(idx) {
    if (idx < 0 || idx >= State.totalRounds) return;
    const animate = Math.abs(idx - State.currentRound) === 1;
    State.currentRound = idx;
    Animator.playRound(idx, animate);
  },

  toggleAutoplay() {
    if (State.isPlaying) {
      this.stopAutoplay();
    } else {
      State.isPlaying = true;
      Timeline.updatePlayState(true);
      if (!State.isLast) {
        Viewer.goToRound(State.currentRound + 1);
      } else {
        State.currentRound = 0;
        Viewer.goToRound(0);
      }
    }
  },

  stopAutoplay() {
    State.isPlaying = false;
    if (State.playInterval) { clearTimeout(State.playInterval); State.playInterval = null; }
    Timeline.updatePlayState(false);
  },

  async init() {
    gsap.registerPlugin(Flip, MotionPathPlugin, TextPlugin);
    Commentary.init();

    $('#btn-back').onclick = () => {
      Animator.kill();
      this.stopAutoplay();
      this.showView('summary');
    };

    $('#winner-close').onclick = () => {
      $('#winner-overlay').classList.remove('active');
    };

    const params = new URLSearchParams(window.location.search);
    const order = params.get('order');

    if (!order) {
      this.showView('empty');
      return;
    }

    this.showView('loading');
    document.title = `Playtest: ${order} — TailorPlayed`;

    const report = await DataLoader.loadReport(order);
    let games = [];

    if (report) {
      State.report = report;
      games = await DataLoader.loadAllFromReport(order, report);
    }

    if (!games.length) {
      games = await DataLoader.discover(order);
    }

    if (!games.length) {
      this.showView('empty');
      return;
    }

    games.sort((a, b) => (a.meta.game_number || 0) - (b.meta.game_number || 0));
    State.games = games;

    // Apply theme from first game
    ThemeEngine.applyTheme(games[0]);

    SummaryView.render(report, games);
    this.showView('summary');

    if (games.length === 1) {
      this.enterReplay(0);
    }
  }
};

// Boot
Viewer.init();
</script>
